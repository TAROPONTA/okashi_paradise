<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🍪 Cookie Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

<!-- 既存CSSはそのままでOK -->
</head>
<body>

<!-- 既存HTMLはそのままでOK -->

<script>
/* =========================================================
   変更点 only
   ① BGMバグ修正（途中で全部鳴らなくなる問題）
   ② 連鎖タイム回復量を減少（難易度UP）
========================================================= */


/* ===============================
   既存変数
=============================== */
let bgmCtx=null;
let bgmTimer=null;
let currentBPM=0;
let muted=false;
let running=false;
let score=0;
let timeLeft=60;


/* ===============================
   効果音用AudioContext
=============================== */
let sfxCtx=null;
function getSfxCtx(){
 if(!sfxCtx || sfxCtx.state==="closed"){
   sfxCtx=new(window.AudioContext||window.webkitAudioContext)();
 }
 return sfxCtx;
}

function tone(freq,dur=.12,vol=.05,type="sine",delay=0,dest=null){
 if(muted)return;
 const c=getSfxCtx();
 if(!dest)dest=c.destination;

 const o=c.createOscillator();
 const g=c.createGain();
 const t=c.currentTime+delay;

 o.type=type;
 o.frequency.setValueAtTime(freq,t);
 g.gain.setValueAtTime(vol,t);
 g.gain.exponentialRampToValueAtTime(.0001,t+dur);

 o.connect(g);
 g.connect(dest);

 o.start(t);
 o.stop(t+dur);
}


/* =========================================================
   ★ BGM完全修正版
   setInterval多重化・context停止不具合を修正
========================================================= */

function bgmBPM(){
 if(score>=300)return 236;
 if(score>=200)return 208;
 if(score>=100)return 180;
 return 152;
}

function stopBGM(){
 if(bgmTimer){
   clearTimeout(bgmTimer);
   bgmTimer=null;
 }

 if(bgmCtx){
   try{ bgmCtx.close(); }catch(e){}
   bgmCtx=null;
 }

 currentBPM=0;
}

function startBGM(){

 stopBGM();
 if(muted)return;

 bgmCtx=new(window.AudioContext||window.webkitAudioContext)();
 const c=bgmCtx;

 const bpm=bgmBPM();
 currentBPM=bpm;

 const beat=60/bpm;

 const melody=[
   784,880,1047,880,
   784,659,784,659,
   523,659,784,880,
   1047,880,784,659
 ];

 let step=0;

 function loop(){

   if(!bgmCtx || c.state==="closed") return;

   const now=c.currentTime+0.03;

   for(let i=0;i<4;i++){

     const note=melody[(step+i)%melody.length];

     const o=c.createOscillator();
     const g=c.createGain();

     o.type="triangle";
     o.frequency.value=note;

     g.gain.setValueAtTime(.04,now+i*beat);
     g.gain.exponentialRampToValueAtTime(.0001,now+i*beat+beat*.9);

     o.connect(g);
     g.connect(c.destination);

     o.start(now+i*beat);
     o.stop(now+i*beat+beat*.9);
   }

   step=(step+4)%melody.length;

   bgmTimer=setTimeout(loop,beat*4*1000);
 }

 loop();
}


/* =========================================================
   ★ 難易度調整（タイム回復減少）
========================================================= */

/*
旧仕様:
1chain = hit×0.6
2chain = hit×1.2
3chain = hit×2.0
...

新仕様（かなり自然な難易度UP）
*/
function timeBonus(hitSize,chainN){

 const mul=[
   0,
   0.35,   //1chain
   0.65,   //2chain
   1.05,   //3chain
   1.55,   //4chain
   2.10    //5+
 ];

 const m=mul[Math.min(chainN,mul.length-1)];
 return hitSize*m;
}


/* =========================================================
   chain処理に組み込む用
========================================================= */
async function chain(n){

 const hit=findMatch();
 if(hit.size===0)return;

 score+=hit.size;

 /* 回復量減少済み */
 timeLeft=Math.min(60,timeLeft+timeBonus(hit.size,n));

 updateUI();

 /* BPM切替 */
 if(running && !muted && bgmBPM()!==currentBPM){
   startBGM();
 }

 await sleep(300);

 gravity();
 render();

 await sleep(250);

 await chain(n+1);
}


/* =========================================================
   ミュート
========================================================= */
function toggleMute(){
 muted=!muted;

 if(muted){
   stopBGM();
 }else{
   if(running)startBGM();
 }
}


/* =========================================================
   スタート
========================================================= */
function startGame(){

 if(running)return;

 getSfxCtx().resume();

 running=true;
 startBGM();

 timer=setInterval(()=>{
   timeLeft-=0.1;

   if(timeLeft<=0){
     timeLeft=0;
     updateUI();
     endGame();
     return;
   }

   updateUI();

 },100);
}


/* =========================================================
   終了
========================================================= */
function endGame(){
 running=false;
 clearInterval(timer);
 stopBGM();
}


/* =========================================================
   リセット
========================================================= */
function resetGame(){
 clearInterval(timer);
 stopBGM();

 running=false;
 score=0;
 timeLeft=60;

 createGrid();
 render();
 updateUI();
}

</script>
</body>
</html>
