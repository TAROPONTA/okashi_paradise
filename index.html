<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🍪 クッキーパズル</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fdf4e7;
  --accent:#f4845f;
  --accent2:#6ec6a0;
  --text:#3d2b1f;
  --muted:#c4956a;
}
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow:auto;
  padding:20px;
}

body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 12% 18%,#fde8d8 0%,transparent 42%),
    radial-gradient(circle at 88% 78%,#dff5ea 0%,transparent 42%);
  z-index:0;pointer-events:none;
}

.container{
  position:relative;z-index:1;
  width:max-content;
  margin:0 auto;
  display:flex;flex-direction:column;
  align-items:center;gap:18px;
}

h1{
  font-family:'Fredoka One',cursive;
  font-size:2.4rem;color:var(--accent);
  text-shadow:3px 3px 0 #fde0d0;
}

.wrap{
  display:flex;gap:24px;
  align-items:flex-start;
  flex-wrap:wrap;justify-content:center;
}

#grid{
  display:grid;
  grid-template-columns:repeat(7,62px);
  grid-template-rows:repeat(9,62px);
  gap:6px;
}

/* 通常セル */
.cell{
  width:62px;height:62px;
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:2.1rem;
  cursor:pointer;user-select:none;
  background:transparent;
  filter:drop-shadow(0 3px 5px rgba(120,60,0,.2));
  transition:transform .12s,filter .12s;
}
.cell:hover{
  transform:scale(1.14) rotate(-4deg);
  filter:drop-shadow(0 6px 10px rgba(120,60,0,.3));
}
.cell:active{transform:scale(.92)}

/* 消えた場所: 完全に非表示・クリック不可 */
.cell-empty{
  width:62px;height:62px;
  visibility:hidden;
  pointer-events:none;
}

/* 消えるアニメ */
.cell.pop{
  animation:burst .4s forwards;
  pointer-events:none;
}
@keyframes burst{
  0%  {transform:scale(1);   opacity:1;filter:brightness(1)}
  40% {transform:scale(1.5); opacity:1;filter:brightness(2)}
  100%{transform:scale(0);   opacity:0}
}

/* 落下アニメ */
.cell.drop{animation:dropIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes dropIn{
  from{transform:translateY(-60px) scale(.7);opacity:0}
  to  {transform:translateY(0)     scale(1); opacity:1}
}

.panel{
  width:160px;
  display:flex;flex-direction:column;gap:12px;
}
.label{font-size:.78rem;color:var(--muted);font-weight:800;letter-spacing:1px;text-transform:uppercase}
.value{font-family:'Fredoka One',cursive;font-size:2.4rem;color:var(--accent);text-shadow:2px 2px 0 #fde0d0}

.timerbar{height:16px;border-radius:999px;background:rgba(180,120,60,.15);overflow:hidden}
#fill{height:100%;width:100%;background:linear-gradient(90deg,#f4845f,#e8bc5a);transition:.15s linear}

.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(180,120,60,.2),transparent)}

.btn{
  border:none;border-radius:14px;padding:12px;
  cursor:pointer;
  font-family:'Fredoka One',cursive;font-size:1rem;
  color:#fff;background:var(--accent);
  box-shadow:0 4px 0 #c95c3a;
  transition:transform .1s,box-shadow .1s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 #c95c3a}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c95c3a}
.btn.green{background:var(--accent2);box-shadow:0 4px 0 #4a9f7a}
.btn.green:hover{box-shadow:0 6px 0 #4a9f7a}
.btn.green:active{box-shadow:0 2px 0 #4a9f7a}
.btn.x-btn{background:#000;box-shadow:0 4px 0 #333}
.btn.x-btn:hover{box-shadow:0 6px 0 #333}
.btn.x-btn:active{box-shadow:0 2px 0 #333}

#combo{
  position:fixed;left:50%;top:44%;
  transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive;font-size:3.2rem;
  color:var(--accent);
  text-shadow:3px 3px 0 #fff,5px 5px 0 #fde0d0;
  opacity:0;pointer-events:none;z-index:50;
}

#particles{position:fixed;inset:0;pointer-events:none;z-index:45;overflow:hidden}
.spark{
  position:absolute;
  font-size:1.6rem;
  animation:fly .85s ease-out forwards;
  pointer-events:none;
}
@keyframes fly{
  0%  {opacity:1;transform:translateY(0)    rotate(0deg)  scale(1)}
  100%{opacity:0;transform:translateY(-90px) rotate(30deg) scale(.3)}
}

#gameover{
  position:fixed;inset:0;
  display:none;
  background:rgba(255,248,240,.95);
  backdrop-filter:blur(6px);
  z-index:60;
  justify-content:center;align-items:center;flex-direction:column;gap:14px;
}
#gameover.show{display:flex}
#gameover h2{font-family:'Fredoka One',cursive;font-size:3rem;color:var(--accent);text-shadow:3px 3px 0 #fde0d0}
#final{font-family:'Fredoka One',cursive;font-size:4.2rem;color:var(--text)}
.go-label{font-size:.8rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px}
#ranking{text-align:center;line-height:2;font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--muted);}
.go-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>

<div id="combo"></div>
<div id="particles"></div>

<div class="container">
  <h1>🍪 クッキーパズル</h1>
  <div class="wrap">
    <div id="grid"></div>
    <div class="panel">
      <div class="label">食べた数</div>
      <div class="value" id="score">0</div>
      <div class="label">ハイスコア</div>
      <div class="value" id="high">0</div>
      <div class="sep"></div>
      <div class="label">タイム</div>
      <div class="timerbar"><div id="fill"></div></div>
      <div class="value" id="time" style="font-size:2rem">60</div>
      <div class="sep"></div>
      <button class="btn" onclick="startGame()" id="startBtn">▶ スタート</button>
      <button class="btn green" onclick="resetGame()">↺ リセット</button>
      <button class="btn" onclick="toggleMute()" id="muteBtn" style="font-size:1.3rem;padding:8px">🔊</button>
    </div>
  </div>
</div>

<div id="gameover">
  <h2>🍪 ゲームオーバー！</h2>
  <div class="go-label">今回のスコア</div>
  <div id="final">0</div>
  <div id="ranking"></div>
  <div class="go-btns">
    <button class="btn" onclick="resetGame()">もう一度 🍪</button>
    <button class="btn x-btn" onclick="shareX()">𝕏 シェア</button>
  </div>
</div>

<script>
const ROWS=9, COLS=7, NEED=4;
const ITEMS=['🍪','🧁','🍩','🍰','🍫','🍬'];

let grid=[], score=0, timeLeft=60;
let running=false, busy=false, timer=null;
let audioCtx=null, muted=false, bgmHandle=null;

const el   = id => document.getElementById(id);
const rand = () => Math.floor(Math.random()*ITEMS.length);
const sleep = ms => new Promise(r=>setTimeout(r,ms));

/* ════════════════════════════════
   Web Audio
════════════════════════════════ */
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function tone(freq,dur=0.12,vol=0.06,type='sine',delay=0,dest=null){
  if(muted) return;
  const c=getCtx();
  if(!dest) dest=c.destination;
  const o=c.createOscillator(), g=c.createGain();
  const t=c.currentTime+delay;
  o.type=type; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(dest);
  o.start(t); o.stop(t+dur);
}

function playClear(n=0){
  if(muted) return;
  const c=getCtx();
  const mg=c.createGain(); mg.gain.value=0.36; mg.connect(c.destination);
  const base=560+n*80;
  [1,1.26,1.5,2].forEach((r,i)=>{
    tone(base*r,   0.14,0.5,'sine',     i*0.055,mg);
    tone(base*r*2, 0.09,0.18,'triangle',i*0.055+0.02,mg);
  });
  tone(base*2.5,0.3,0.2,'sine',0.23,mg);
}

function playCombo(n){
  if(muted) return;
  const c=getCtx();
  const mg=c.createGain(); mg.gain.value=0.33; mg.connect(c.destination);
  const sc=[523,659,784,1047,1319];
  const top=Math.min(n,sc.length-1);
  for(let i=0;i<=top;i++){
    tone(sc[i],    0.18,0.5,'sine',     i*0.07,mg);
    tone(sc[i]*1.5,0.1, 0.2,'triangle',i*0.07+0.01,mg);
  }
}

function playOver(){
  if(muted) return;
  [440,392,349,294,261].forEach((f,i)=>tone(f,0.28,0.06,'sine',i*0.12));
}

/* ════════════════════════════════
   BGM: 明るくポップ & 弾むビート
   メロディ + カウンター + ベース + ドラム
════════════════════════════════ */
function startBGM(){
  stopBGM();
  if(muted) return;
  const c=getCtx();
  const BPM=152, beat=60/BPM;

  /* メロディ: 跳ねるポップなフレーズ */
  const mel=[
    [784,.5],[880,.5],[1047,1],[880,.5],[784,.5],
    [659,1 ],[784,1 ],[659,.5],[523,.5],
    [523,.5],[659,.5],[784,1 ],[880,.5],[1047,.5],
    [880,1 ],[784,1 ],[659,2 ],
    [880,.5],[1047,.5],[1175,1],[1047,.5],[880,.5],
    [784,1 ],[880,1 ],[784,.5],[659,.5],
    [659,.5],[784,.5],[880,1 ],[784,.5],[659,.5],
    [523,1 ],[659,1 ],[784,2 ],
  ];
  /* カウンターメロディ */
  const cnt=mel.map(([f,d])=>[f*1.498,d]);
  /* ベース */
  const bass=[
    [196,.5],[196,.5],[196,1],[220,.5],[196,.5],
    [165,1 ],[196,1 ],[165,.5],[131,.5],
    [131,.5],[165,.5],[196,1],[220,.5],[261,.5],
    [220,1 ],[196,1 ],[165,2],
    [220,.5],[261,.5],[294,1],[261,.5],[220,.5],
    [196,1 ],[220,1 ],[196,.5],[165,.5],
    [165,.5],[196,.5],[220,1],[196,.5],[165,.5],
    [131,1 ],[165,1 ],[196,2],
  ];

  const totalBeats=mel.reduce((s,[,d])=>s+d,0);
  const loopSec=totalBeats*beat;

  const gMel=c.createGain(); gMel.gain.value=0.10; gMel.connect(c.destination);
  const gCnt=c.createGain(); gCnt.gain.value=0.05; gCnt.connect(c.destination);
  const gBas=c.createGain(); gBas.gain.value=0.09; gBas.connect(c.destination);
  const gHat=c.createGain(); gHat.gain.value=0.032;gHat.connect(c.destination);
  const gKik=c.createGain(); gKik.gain.value=0.11; gKik.connect(c.destination);

  function sched(start,notes,dest,type='sine'){
    let t=start;
    notes.forEach(([f,d])=>{
      tone(f,d*beat*0.76,0.55,type,t-c.currentTime,dest);
      t+=d*beat;
    });
  }

  function schedDrum(start){
    const steps=totalBeats*2;
    for(let i=0;i<steps;i++){
      const t=start+i*beat*0.5;
      /* 16分ハイハット */
      tone(10000+Math.random()*4000,0.016,i%2===0?0.42:0.16,'sawtooth',t-c.currentTime,gHat);
      /* キック: 1・3拍目 */
      if(i%4===0){
        tone(80, 0.16,0.85,'sine',t-c.currentTime,gKik);
        tone(55, 0.20,0.55,'sine',t-c.currentTime+0.01,gKik);
      }
      /* スネア: 2・4拍目 */
      if(i%4===2){
        tone(220+Math.random()*80,0.08,0.3,'sawtooth',t-c.currentTime,gHat);
        tone(180,0.10,0.22,'square',t-c.currentTime,gHat);
      }
    }
  }

  let nextStart=c.currentTime+0.05;
  function loop(){
    sched(nextStart,mel, gMel,'sine');
    sched(nextStart,cnt, gCnt,'triangle');
    sched(nextStart,bass,gBas,'triangle');
    schedDrum(nextStart);
    nextStart+=loopSec;
  }
  loop(); loop();
  bgmHandle=setInterval(()=>{ if(!muted&&bgmHandle) loop(); },(loopSec-0.3)*1000);
}

function stopBGM(){
  if(bgmHandle){ clearInterval(bgmHandle); bgmHandle=null; }
}

function toggleMute(){
  muted=!muted;
  el('muteBtn').textContent=muted?'🔇':'🔊';
  if(muted) stopBGM();
  else if(running) startBGM();
}

/* ════════════════════════════════
   グリッド
════════════════════════════════ */
function createGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++) grid[r][c]=rand();
  }
}

/* grid[r][c] === -1 のセルは完全非表示の空枠 */
function render(dropSet=null){
  const g=el('grid');
  g.innerHTML='';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const val=grid[r][c];
      const d=document.createElement('div');
      if(val===-1){
        /* 消えたセル: 見えない・触れない */
        d.className='cell-empty';
      } else {
        d.className='cell';
        if(dropSet?.has(r+','+c)) d.classList.add('drop');
        d.textContent=ITEMS[val];
        d.onclick=clickCell;
        d.dataset.r=r; d.dataset.c=c;
      }
      g.appendChild(d);
    }
  }
}

/* マッチ判定: 連結グループ4個以上 */
function findMatch(){
  const seen=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  const set=new Set();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]===-1||seen[r][c]) continue;
      const type=grid[r][c];
      const stack=[[r,c]], group=[];
      seen[r][c]=true;
      while(stack.length){
        const[y,x]=stack.pop();
        group.push([y,x]);
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dy,dx])=>{
          const ny=y+dy,nx=x+dx;
          if(ny>=0&&nx>=0&&ny<ROWS&&nx<COLS&&!seen[ny][nx]&&grid[ny][nx]===type){
            seen[ny][nx]=true; stack.push([ny,nx]);
          }
        });
      }
      if(group.length>=NEED) group.forEach(([y,x])=>set.add(y+','+x));
    }
  }
  return set;
}

function gravity(){
  const drop=new Set();
  for(let c=0;c<COLS;c++){
    let w=ROWS-1;
    for(let r=ROWS-1;r>=0;r--){
      if(grid[r][c]!==-1){
        grid[w][c]=grid[r][c];
        if(w!==r) drop.add(w+','+c);
        w--;
      }
    }
    for(let r=w;r>=0;r--){ grid[r][c]=rand(); drop.add(r+','+c); }
  }
  return drop;
}

/* 座標(r,c)からDOMセルを取得するヘルパー */
function getCellEl(r,c){
  return el('grid').querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

/* ════════════════════════════════
   クリック: 1個消去 → 落下 → 連鎖
════════════════════════════════ */
async function clickCell(e){
  if(!running||busy) return;
  busy=true;

  const r=+e.currentTarget.dataset.r;
  const c=+e.currentTarget.dataset.c;

  /* ① パーティクル発火 → grid即消去 → render で絵文字を消す */
  const cellEl=getCellEl(r,c);
  if(cellEl){
    const rect=cellEl.getBoundingClientRect();
    spawnSparks(rect.left+rect.width/2, rect.top+rect.height/2, 4);
  }
  playClear(0);
  grid[r][c]=-1;
  timeLeft=Math.max(0,timeLeft-1);
  render(null);   /* ← ここで確実に空セルになる */

  /* ② 落下 */
  await sleep(160);
  const drop=gravity();
  render(drop);

  /* ③ 落下アニメ待ち → 連鎖チェック */
  await sleep(300);
  await chain(1);
  busy=false;
}

/* ════════════════════════════════
   連鎖処理
════════════════════════════════ */
async function chain(n){
  const hit=findMatch();
  if(hit.size===0) return;

  /* コンボ表示 */
  showCombo(n);
  if(n>1) playCombo(n);

  /* ① パーティクル発火 → grid即消去 → render で絵文字を全部消す */
  hit.forEach(k=>{
    const[r,c]=k.split(',').map(Number);
    const cellEl=getCellEl(r,c);
    if(!cellEl) return;
    const rect=cellEl.getBoundingClientRect();
    spawnSparks(rect.left+rect.width/2, rect.top+rect.height/2, 5);
    grid[r][c]=-1;   /* ← renderより先にgridを-1に */
  });

  playClear(n-1);
  render(null);     /* ← 全対象セルが空セルになって確実に消える */

  /* スコア・タイム更新 */
  score+=hit.size;
  timeLeft=Math.min(60,timeLeft+Math.floor(hit.size*0.7));
  updateUI();

  /* ② キラキラを見せる間を置いて落下 */
  await sleep(480);
  const drop=gravity();
  render(drop);

  /* ③ 落下アニメ待ち → 次の連鎖 */
  await sleep(300);
  await chain(n+1);
}

/* ════════════════════════════════
   コンボ表示
════════════════════════════════ */
function showCombo(n){
  const d=el('combo');
  d.style.transition='none';
  d.style.opacity='0';
  d.textContent=n+' CHAIN! 🔥';
  requestAnimationFrame(()=>{
    d.style.opacity='1';
    d.style.transform='translate(-50%,-50%) scale(1.15)';
    setTimeout(()=>{
      d.style.transition='opacity .65s, transform .65s';
      d.style.opacity='0';
      d.style.transform='translate(-50%,-63%) scale(.87)';
    }, 750);
  });
}

/* ════════════════════════════════
   パーティクル
════════════════════════════════ */
function spawnSparks(x,y,num=5){
  const icons=['✨','⭐','💫','🌟','🎉','🍬'];
  const p=el('particles');
  for(let i=0;i<num;i++){
    const s=document.createElement('div');
    s.className='spark';
    s.textContent=icons[Math.floor(Math.random()*icons.length)];
    s.style.left=(x+(Math.random()-.5)*60)+'px';
    s.style.top =(y+(Math.random()-.5)*30)+'px';
    p.appendChild(s);
    setTimeout(()=>s.remove(),900);
  }
}

/* ════════════════════════════════
   UI / タイマー
════════════════════════════════ */
function updateUI(){
  el('score').textContent=score;
  el('time').textContent=Math.ceil(timeLeft);
  const pct=timeLeft/60*100;
  el('fill').style.width=pct+'%';
  el('fill').style.background=
    pct>40?'linear-gradient(90deg,#f4845f,#e8bc5a)':
    pct>20?'linear-gradient(90deg,#e87040,#e05a2a)':
           'linear-gradient(90deg,#e02020,#c01010)';
}

function startGame(){
  if(running) return;
  getCtx().resume();
  running=true;
  el('startBtn').disabled=true;
  el('startBtn').textContent='⏳ プレイ中';
  startBGM();
  timer=setInterval(()=>{
    timeLeft-=0.1;
    if(timeLeft<=0){ timeLeft=0; updateUI(); endGame(); return; }
    updateUI();
  },100);
}

function endGame(){
  running=false;
  clearInterval(timer);
  stopBGM();
  playOver();
  saveScore();
  el('final').textContent=score;
  showRanking();
  el('gameover').classList.add('show');
}

/* ════════════════════════════════
   スコア保存 / ランキング
════════════════════════════════ */
function saveScore(){
  let hs=+localStorage.getItem('cookieHigh')||0;
  if(score>hs) localStorage.setItem('cookieHigh',score);
  let arr=JSON.parse(localStorage.getItem('cookieRank')||'[]');
  arr.push(score); arr.sort((a,b)=>b-a);
  localStorage.setItem('cookieRank',JSON.stringify(arr.slice(0,5)));
}

function loadScore(){
  el('high').textContent=localStorage.getItem('cookieHigh')||0;
}

function showRanking(){
  const arr=JSON.parse(localStorage.getItem('cookieRank')||'[]');
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣'];
  el('ranking').innerHTML=arr.length
    ? arr.map((v,i)=>`${medals[i]} ${v} 個`).join('<br>')
    : '';
  loadScore();
}

/* ════════════════════════════════
   X シェア
════════════════════════════════ */
function shareX(){
  const text=`#クッキーパズル\nお菓子を${score}個食べたよ！🍪\nあなたは何個食べられるかな？`;
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text),'_blank','noopener');
}

/* ════════════════════════════════
   リセット
════════════════════════════════ */
function resetGame(){
  clearInterval(timer);
  stopBGM();
  running=false; busy=false; score=0; timeLeft=60;
  el('gameover').classList.remove('show');
  el('startBtn').disabled=false;
  el('startBtn').textContent='▶ スタート';
  createGrid();
  let n=0;
  while(findMatch().size>0&&n++<20) createGrid();
  render();
  updateUI();
  loadScore();
}

resetGame();
</script>
</body>
</html>
