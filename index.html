<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🍪 クッキーパズル FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#fdf4e7;
--accent:#f4845f;
--accent2:#6ec6a0;
--text:#3d2b1f;
--muted:#c4956a;
}
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Nunito',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
overflow:auto;
padding:20px;
}

.container{
width:max-content;
margin:0 auto;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

h1{
font-family:'Fredoka One',cursive;
font-size:2.4rem;
color:var(--accent);
}

.wrap{
display:flex;
gap:24px;
align-items:flex-start;
flex-wrap:wrap;
justify-content:center;
}

#grid{
display:grid;
grid-template-columns:repeat(7,62px);
grid-template-rows:repeat(9,62px);
gap:6px;
}

.cell{
width:62px;height:62px;
border-radius:16px;
background:#fff8f2;
display:flex;
align-items:center;
justify-content:center;
font-size:2rem;
cursor:pointer;
user-select:none;
box-shadow:0 4px 8px rgba(0,0,0,.08);
transition:.12s;
}
.cell:hover{transform:scale(1.08)}
.cell.pop{animation:pop .35s forwards}
.cell.drop{animation:drop .25s}

@keyframes pop{
0%{transform:scale(1);opacity:1}
100%{transform:scale(0);opacity:0}
}
@keyframes drop{
0%{transform:translateY(-35px)}
100%{transform:translateY(0)}
}

.panel{
width:160px;
display:flex;
flex-direction:column;
gap:14px;
}

.block{text-align:center}
.label{font-size:.8rem;color:var(--muted);font-weight:800}
.value{
font-family:'Fredoka One',cursive;
font-size:2.4rem;
color:var(--accent);
}

.timerbar{
height:16px;
border-radius:999px;
background:#eadbca;
overflow:hidden;
}
#fill{
height:100%;
width:100%;
background:linear-gradient(90deg,#f4845f,#e8bc5a);
transition:width .1s linear;
}

.btn{
border:none;
border-radius:14px;
padding:12px;
cursor:pointer;
font-family:'Fredoka One',cursive;
color:#fff;
background:var(--accent);
}
.btn.green{background:var(--accent2)}

#combo{
position:fixed;
left:50%;
top:45%;
transform:translate(-50%,-50%);
font-family:'Fredoka One',cursive;
font-size:3rem;
color:var(--accent);
opacity:0;
pointer-events:none;
z-index:50;
}

#particles{
position:fixed;
inset:0;
pointer-events:none;
z-index:40;
}

.spark{
position:absolute;
font-size:1.5rem;
animation:fly .8s forwards;
}

@keyframes fly{
0%{opacity:1;transform:translateY(0) scale(1)}
100%{opacity:0;transform:translateY(-80px) rotate(25deg) scale(.4)}
}

#gameover{
position:fixed;
inset:0;
display:none;
background:rgba(255,248,240,.94);
z-index:60;
justify-content:center;
align-items:center;
flex-direction:column;
gap:16px;
}

#gameover.show{display:flex}

#gameover h2{
font-family:'Fredoka One',cursive;
font-size:3rem;
color:var(--accent);
}

#final{
font-family:'Fredoka One',cursive;
font-size:4rem;
}

#ranking{text-align:center;line-height:1.8}

@media(max-width:800px){
.wrap{flex-direction:column;align-items:center}
}
</style>
</head>

<body>

<div id="combo"></div>
<div id="particles"></div>

<div class="container">

<h1>🍪 クッキーパズル FINAL</h1>

<div class="wrap">

<div id="grid"></div>

<div class="panel">

<div class="block">
<div class="label">食べた数</div>
<div class="value" id="score">0</div>
</div>

<div class="block">
<div class="label">ハイスコア</div>
<div class="value" id="high">0</div>
</div>

<div class="block">
<div class="label">タイム</div>
<div class="timerbar"><div id="fill"></div></div>
<div class="value" id="time" style="font-size:2rem">60</div>
</div>

<button class="btn" onclick="startGame()" id="startBtn">▶ スタート</button>
<button class="btn green" onclick="resetGame()">↺ リセット</button>
<button class="btn" onclick="toggleMute()" id="muteBtn">🔊</button>

</div>
</div>
</div>

<div id="gameover">
<h2>🍪 ゲームオーバー</h2>
<div id="final">0</div>
<div id="ranking"></div>
<button class="btn" onclick="resetGame()">もう一度あそぶ</button>
<button class="btn green" onclick="shareScore()">𝕏 シェア</button>
</div>

<script>
const ROWS=9,COLS=7,NEED=4;
const ITEMS=['🍪','🧁','🍩','🍰','🍫','🍬'];

let grid=[],score=0,timeLeft=60;
let running=false,busy=false,timer=null;
let audioCtx=null,muted=false,bgm=null;

/* util */
function el(id){return document.getElementById(id)}
function rand(){return Math.floor(Math.random()*ITEMS.length)}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

/* audio */
function ctx(){
if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
return audioCtx;
}

function tone(freq,dur=.15,vol=.04,type="sine",delay=0){
if(muted)return;
const c=ctx();
const now=c.currentTime+delay;
const o=c.createOscillator();
const g=c.createGain();
o.type=type;
o.frequency.value=freq;
g.gain.setValueAtTime(vol,now);
g.gain.exponentialRampToValueAtTime(.0001,now+dur);
o.connect(g);g.connect(c.destination);
o.start(now);o.stop(now+dur);
}

function clearSound(){
tone(620,.08,.05);
tone(880,.1,.04,"triangle",.05);
}

function comboSound(){
tone(880,.08,.05);
tone(1170,.12,.04,"triangle",.05);
}

function overSound(){
tone(420,.2,.05);
tone(260,.35,.04,"triangle",.2);
}

function startBGM(speed=1){
stopBGM();
const notes=[523,659,784,880,784,659,523,392,440,523,659,784,880,784,659,523];
let i=0;
bgm=setInterval(()=>{
tone(notes[i],.22,.02);
tone(notes[i]/2,.18,.012,"triangle");
i++;if(i>=notes.length)i=0;
},240/speed);
}

function stopBGM(){
if(bgm){clearInterval(bgm);bgm=null;}
}

function toggleMute(){
muted=!muted;
el("muteBtn").textContent=muted?"🔇":"🔊";
if(muted)stopBGM();
else if(running)startBGM(timeLeft<=10?1.4:1);
}

/* game */
function createGrid(){
grid=[];
for(let r=0;r<ROWS;r++){
grid[r]=[];
for(let c=0;c<COLS;c++)grid[r][c]=rand();
}
}

function render(drop=null){
const g=el("grid");
g.innerHTML="";
for(let r=0;r<ROWS;r++){
for(let c=0;c<COLS;c++){
const d=document.createElement("div");
d.className="cell";
if(drop&&drop.has(r+","+c))d.classList.add("drop");
d.dataset.r=r;
d.dataset.c=c;
d.textContent=ITEMS[grid[r][c]];
d.onclick=clickCell;
g.appendChild(d);
}
}
}

async function clickCell(e){
if(!running||busy)return;
busy=true;

const cell=e.currentTarget;
const r=+cell.dataset.r,c=+cell.dataset.c;

cell.classList.add("pop");
clearSound();
spark(cell);

await sleep(180);

grid[r][c]=-1;
timeLeft=Math.max(0,timeLeft-1);
gravity();
render();

await sleep(220);

await chain(0);

busy=false;
}

function findMatch(){
const set=new Set();
const seen=[...Array(ROWS)].map(()=>Array(COLS).fill(false));

for(let r=0;r<ROWS;r++){
for(let c=0;c<COLS;c++){
if(grid[r][c]===-1||seen[r][c])continue;

const type=grid[r][c];
const stack=[[r,c]];
const group=[];
seen[r][c]=true;

while(stack.length){
const [y,x]=stack.pop();
group.push([y,x]);

[[1,0],[-1,0],[0,1],[0,-1]].forEach(([dy,dx])=>{
const ny=y+dy,nx=x+dx;
if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS&&!seen[ny][nx]&&grid[ny][nx]===type){
seen[ny][nx]=true;
stack.push([ny,nx]);
}
});
}

if(group.length>=NEED){
group.forEach(v=>set.add(v[0]+","+v[1]));
}
}
}
return set;
}

function gravity(){
const drop=new Set();
for(let c=0;c<COLS;c++){
let w=ROWS-1;
for(let r=ROWS-1;r>=0;r--){
if(grid[r][c]!==-1){
grid[w][c]=grid[r][c];
if(w!==r)drop.add(w+","+c);
w--;
}
}
for(let r=w;r>=0;r--){
grid[r][c]=rand();
drop.add(r+","+c);
}
}
return drop;
}

async function chain(n){
const hit=findMatch();
if(hit.size===0)return;

hit.forEach(key=>{
const [r,c]=key.split(",");
grid[r][c]=-1;
});

score+=hit.size;
timeLeft=Math.min(60,timeLeft+Math.floor(hit.size*.7));
updateUI();

clearSound();

if(n>0){
combo(n+1);
comboSound();
}

await sleep(180);

const d=gravity();
render(d);

await sleep(250);

await chain(n+1);
}

function combo(n){
const d=el("combo");
d.textContent=n+" CHAIN!";
d.style.opacity="1";
d.style.transform="translate(-50%,-50%) scale(1.2)";
setTimeout(()=>{
d.style.transition=".5s";
d.style.opacity="0";
d.style.transform="translate(-50%,-65%) scale(.8)";
},50);
setTimeout(()=>d.style.transition="none",600);
}

function spark(cell){
const rect=cell.getBoundingClientRect();
for(let i=0;i<8;i++){
const s=document.createElement("div");
s.className="spark";
s.textContent=["✨","⭐","💫","🌟"][Math.floor(Math.random()*4)];
s.style.left=(rect.left+20+Math.random()*20)+"px";
s.style.top=(rect.top+15+Math.random()*20)+"px";
el("particles").appendChild(s);
setTimeout(()=>s.remove(),800);
}
}

/* timer */
function startGame(){
if(running)return;
ctx().resume();

running=true;
el("startBtn").disabled=true;
el("startBtn").textContent="⏳ プレイ中";

startBGM();

timer=setInterval(()=>{
timeLeft-=0.1;

if(timeLeft<=10&&timeLeft>9.8){
startBGM(1.4);
}

if(timeLeft<=0){
timeLeft=0;
updateUI();
endGame();
return;
}

updateUI();
},100);
}

function endGame(){
running=false;
clearInterval(timer);
stopBGM();
overSound();

saveScore();

el("final").textContent=score;
showRanking();
el("gameover").classList.add("show");
}

function updateUI(){
el("score").textContent=score;
el("time").textContent=Math.ceil(timeLeft);
el("fill").style.width=(timeLeft/60*100)+"%";
}

function saveScore(){
let hs=+localStorage.getItem("cookieHigh")||0;
if(score>hs)localStorage.setItem("cookieHigh",score);

let arr=JSON.parse(localStorage.getItem("cookieRank")||"[]");
arr.push(score);
arr.sort((a,b)=>b-a);
arr=arr.slice(0,5);
localStorage.setItem("cookieRank",JSON.stringify(arr));
}

function loadScore(){
el("high").textContent=localStorage.getItem("cookieHigh")||0;
}

function showRanking(){
const arr=JSON.parse(localStorage.getItem("cookieRank")||"[]");
el("ranking").innerHTML=arr.map((v,i)=>`${i+1}位　${v}個`).join("<br>");
loadScore();
}

function shareScore(){
window.open(
"https://twitter.com/intent/tweet?text="+encodeURIComponent(`クッキーパズルで${score}個食べた！`),
"_blank"
);
}

function resetGame(){
clearInterval(timer);
stopBGM();
running=false;
busy=false;
score=0;
timeLeft=60;

el("gameover").classList.remove("show");
el("startBtn").disabled=false;
el("startBtn").textContent="▶ スタート";

createGrid();

let n=0;
while(findMatch().size>0&&n<20){
createGrid();
n++;
}

render();
updateUI();
loadScore();
showRanking();
}

resetGame();
</script>

</body>
</html>
