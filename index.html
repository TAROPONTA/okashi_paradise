<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cookie Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fdf4e7;--accent:#f4845f;--accent2:#6ec6a0;
  --text:#3d2b1f;--muted:#c4956a;
}
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(circle at 12% 18%,#fde8d8 0%,transparent 42%),
    radial-gradient(circle at 88% 78%,#dff5ea 0%,transparent 42%);
  z-index:0;pointer-events:none;
}

/* 言語ボタン */
#lang-switch{position:fixed;top:12px;left:12px;z-index:200;display:flex;gap:6px;}
.lang-btn{
  border:2px solid var(--accent);border-radius:10px;padding:3px 9px;
  font-family:'Fredoka One',cursive;font-size:.82rem;cursor:pointer;
  background:#fff8f0;color:var(--accent);transition:background .15s,color .15s;
}
.lang-btn.active{background:var(--accent);color:#fff;}

/* タイトルロゴ */
#title-logo{
  position:relative;z-index:1;
  margin:10px 0 8px;
  flex-shrink:0;
}

/* メインレイアウト */
.game-area{
  position:relative;z-index:1;
  display:flex;gap:20px;align-items:flex-start;
  flex-shrink:1;
}

/* グリッドWrapper */
#grid-wrapper{
  background:rgba(255,248,240,0.72);
  border-radius:16px;
  border:1.5px solid rgba(220,170,110,0.28);
  box-shadow:0 4px 24px rgba(180,110,50,0.12);
  padding:8px;
  flex-shrink:0;
  transform-origin:top left;
}
#grid{
  display:grid;
  grid-template-columns:repeat(7,60px);
  grid-template-rows:repeat(8,60px);
  gap:5px;
}
.cell{
  width:60px;height:60px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;
  background:rgba(255,255,255,0.6);
  border:1.5px solid rgba(210,160,100,0.20);
  box-shadow:0 2px 6px rgba(150,90,30,0.08),inset 0 1px 0 rgba(255,255,255,0.8);
  transition:transform .12s,box-shadow .12s,background .12s;
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
}
.cell:hover{
  transform:scale(1.13) rotate(-3deg);
  box-shadow:0 6px 16px rgba(150,90,30,0.20),inset 0 1px 0 rgba(255,255,255,0.9);
  background:rgba(255,255,255,0.88);
}
.cell:active{transform:scale(.9)}
.cell-empty{width:60px;height:60px;visibility:hidden;pointer-events:none;}
.cell.drop{animation:dropIn .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes dropIn{
  from{transform:translateY(-60px) scale(.7);opacity:0}
  to{transform:translateY(0) scale(1);opacity:1}
}

/* PCパネル */
.panel{width:148px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.panel-mobile{display:none}
.label{font-size:.75rem;color:var(--muted);font-weight:800;letter-spacing:1px;text-transform:uppercase}
.value{font-family:'Fredoka One',cursive;font-size:1.9rem;color:var(--accent);text-shadow:2px 2px 0 #fde0d0;line-height:1.1;}
.timerbar{height:14px;border-radius:999px;background:rgba(180,120,60,.15);overflow:hidden}
#fill,#fill-m{height:100%;width:100%;background:linear-gradient(90deg,#f4845f,#e8bc5a);transition:.15s linear}
.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(180,120,60,.2),transparent)}

.btn{
  border:none;border-radius:12px;padding:10px;cursor:pointer;
  font-family:'Fredoka One',cursive;font-size:.95rem;
  color:#fff;background:var(--accent);box-shadow:0 4px 0 #c95c3a;
  transition:transform .1s,box-shadow .1s;-webkit-tap-highlight-color:transparent;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 #c95c3a}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c95c3a}
.btn.green{background:var(--accent2);box-shadow:0 4px 0 #4a9f7a}
.btn.green:hover{box-shadow:0 6px 0 #4a9f7a}
.btn.green:active{box-shadow:0 2px 0 #4a9f7a}
.btn.x-btn{background:#000;box-shadow:0 4px 0 #333}
.btn.x-btn:hover{box-shadow:0 6px 0 #333}
.btn.x-btn:active{box-shadow:0 2px 0 #333}
#muteBtn,#muteBtn-m{font-size:1.2rem;padding:7px;opacity:1;transition:opacity .2s}
#muteBtn.muted,#muteBtn-m.muted{opacity:.5}

/* コンボ */
#combo{
  position:fixed;left:50%;top:44%;transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive;font-size:3rem;
  color:var(--accent);text-shadow:3px 3px 0 #fff,5px 5px 0 #fde0d0;
  opacity:0;pointer-events:none;z-index:50;
}
/* パーティクル */
#particles{position:fixed;inset:0;pointer-events:none;z-index:45;overflow:hidden}
.spark{position:absolute;font-size:1.5rem;animation:fly .85s ease-out forwards;pointer-events:none;}
@keyframes fly{
  0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}
  100%{opacity:0;transform:translateY(-90px) rotate(30deg) scale(.3)}
}

/* ゲームオーバー */
#gameover{
  position:fixed;inset:0;display:none;
  background:rgba(255,248,240,.95);backdrop-filter:blur(6px);
  z-index:60;justify-content:center;align-items:center;flex-direction:column;gap:12px;
}
#gameover.show{display:flex}
#gameover h2{font-family:'Fredoka One',cursive;font-size:2.8rem;color:var(--accent);text-shadow:3px 3px 0 #fde0d0}
#final{font-family:'Fredoka One',cursive;font-size:4rem;color:var(--text)}
.go-label{font-size:.78rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px}
#go-title-badge{font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--accent);text-shadow:2px 2px 0 #fde0d0;}
#ranking{text-align:center;line-height:1.9;font-family:'Fredoka One',cursive;font-size:1rem;color:var(--muted);}
.go-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* ピンチ点滅 */
@keyframes dangerPulse{0%,100%{color:var(--accent);}50%{color:#e02020;}}
.danger{animation:dangerPulse .5s infinite;}

/* マイルストーン */
#milestone-msg{
  position:fixed;left:50%;top:36%;transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive;font-size:2.4rem;
  color:#6ec6a0;text-shadow:3px 3px 0 #fff,5px 5px 0 #c8f0e0;
  opacity:0;pointer-events:none;z-index:51;
}
/* NEW RECORD */
#new-record{
  position:fixed;left:50%;top:30%;transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive;font-size:2.8rem;
  color:#e8bc5a;text-shadow:3px 3px 0 #fff,5px 5px 0 #fde8a0;
  opacity:0;pointer-events:none;z-index:52;
}
/* 紙吹雪 */
.confetti{
  position:fixed;pointer-events:none;z-index:55;border-radius:2px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}

/* スマホ */
@media(max-width:600px){
  /* 全体を100dvhに収める */
  body{
    overflow:hidden;
    height:100dvh;
    height:100vh; /* fallback */
    flex-direction:column;
    justify-content:flex-start;
    padding:0;
  }
  #lang-switch{top:6px;left:8px;z-index:300;}

  /* タイトルロゴをコンパクトに */
  #title-logo{margin:30px 0 4px;flex-shrink:0;}
  #title-logo svg{height:36px;width:auto;}

  /* game-areaは縦並び */
  .game-area{flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}

  /* PCパネル非表示 */
  .panel{display:none}

  /* スマホパネル */
  .panel-mobile{
    display:flex;flex-direction:column;gap:5px;
    width:100%;padding:0 10px;
    flex-shrink:0;
    box-sizing:border-box;
  }
  .mob-stats{display:flex;gap:6px;justify-content:space-between;align-items:flex-end;}
  .mob-stat{flex:1;text-align:center;}
  .mob-stat .label{font-size:.60rem;}
  .mob-stat .value{font-size:1.45rem;line-height:1.1;}
  .mob-timer{width:100%;}
  .timerbar{height:12px;}
  .mob-btns{display:flex;gap:6px;}
  .mob-btns .btn{flex:1;padding:8px 2px;font-size:.82rem;border-radius:10px;}

  /* グリッドwrapperはscaleGridがサイズ決定 */
  #grid-wrapper{transform-origin:top center;flex-shrink:0;}

  /* donateボタンはスマホでは非fixed・小さくインライン配置 */
  #donateBtn{
    position:relative!important;
    right:auto!important;bottom:auto!important;
    left:auto!important;
    transform:none!important;
    display:block;
    width:calc(100% - 20px);
    margin:4px 10px 6px;
    text-align:center;
    font-size:.82rem!important;
    padding:8px 10px!important;
    box-sizing:border-box;
    z-index:1;
  }
  #combo{font-size:1.8rem;}
}
</style>
</head>
<body>

<!-- SVGタイトルロゴ -->

<script>
/* ══════════════════════════════════
   多言語
══════════════════════════════════ */
const LANGS={
  ja:{
    scoreLabel:'食べた数',highLabel:'ハイスコア',timeLabel:'タイム',
    start:'▶ スタート',playing:'⏳ プレイ中',reset:'↺ リセット',

      [70,'🍰 ケーキ職人'],[100,'🍫 チョコレート師'],[140,'🍬 キャンディマスター'],
      [180,'✨ スイーツの達人'],[230,'🌟 お菓子の申し子'],[280,'💎 パティシエ見習い'],
      [340,'🏆 一流パティシエ'],[400,'👑 お菓子の貴族'],[470,'🌈 お菓子の王子/王女'],
      [550,'🔥 伝説のパティシエ'],[640,'🎖️ お菓子の騎士'],[740,'🗡️ スイーツの勇者'],
      [850,'🧙 お菓子の魔法使い'],[970,'🌙 夜のパティシエ'],[1000,'🍪👑 お菓子大王'],
      [1100,'⚡ お菓子の覇者'],[1250,'🌌 スイーツの神'],[1400,'🔮 お菓子の賢者'],
      [1600,'💫 究極のパティシエ'],[1800,'🌠 お菓子の伝説'],[2000,'🍪✨👑 お菓子の神様'],
    ],
    shareTitle:(s,t)=>`#クッキーパズル\nお菓子を${s}個食べたよ！${t}\nあなたは何個食べられるかな？\nhttps://taroponta.itch.io/cookie-puzzle`,
  },
  en:{
    scoreLabel:'Cookies Eaten',highLabel:'High Score',timeLabel:'Time',
    start:'▶ Start',playing:'⏳ Playing',reset:'↺ Reset',
    goTitle:'🍪 Game Over!',goScore:'Your Score',goRetry:'Play Again 🍪',goShare:'𝕏 Share',
    rankSuffix:'',newRecord:'🎉 NEW RECORD!',milestone:n=>`${n} Cookies! 🍪`,
    donate:'☕ Buy me a snack',
    titles:[
      [0,'🍪 Cookie Rookie'],[20,'🧁 Sweet Lover'],[40,'🍩 Donut Artisan'],
      [70,'🍰 Cake Crafter'],[100,'🍫 Chocolate Expert'],[140,'🍬 Candy Master'],
      [180,'✨ Sweets Virtuoso'],[230,'🌟 Cookie Prodigy'],[280,'💎 Junior Patissier'],
      [340,'🏆 Master Patissier'],[400,'👑 Confectionery Noble'],[470,'🌈 Cookie Prince/Princess'],
      [550,'🔥 Legendary Patissier'],[640,'🎖️ Cookie Knight'],[740,'🗡️ Sweets Champion'],
      [850,'🧙 Cookie Sorcerer'],[970,'🌙 Midnight Patissier'],[1000,'🍪👑 Cookie Monarch'],
      [1100,'⚡ Cookie Conqueror'],[1250,'🌌 Sweets Deity'],[1400,'🔮 Cookie Sage'],
      [1600,'💫 Ultimate Patissier'],[1800,'🌠 Cookie Legend'],[2000,'🍪✨👑 Cookie God'],
    ],
    shareTitle:(s,t)=>`#CookiePuzzle\nI ate ${s} cookies! ${t}\nCan you beat my score?\nhttps://taroponta.itch.io/cookie-puzzle`,
  }
};
let lang='ja';

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===(l==='ja'?'JP':'EN')));
  applyLang();
}
function applyLang(){
  const T=LANGS[lang];
  const ids={
    'txt-score-label':T.scoreLabel,'txt-high-label':T.highLabel,'txt-time-label':T.timeLabel,
    'txt-go-title':T.goTitle,'txt-go-score':T.goScore,'txt-go-retry':T.goRetry,'txt-go-share':T.goShare,
    'txt-score-label-m':T.scoreLabel,'txt-high-label-m':T.highLabel,'txt-time-label-m':T.timeLabel,
  };
  Object.entries(ids).forEach(([id,v])=>{const e=document.getElementById(id);if(e)e.textContent=v;});
  document.getElementById('startBtn').textContent=running?T.playing:T.start;
  document.getElementById('resetBtn').textContent=T.reset;
  const sbm=document.getElementById('startBtn-m');if(sbm)sbm.textContent=running?T.playing:T.start;
  const rbm=document.getElementById('resetBtn-m');if(rbm)rbm.textContent=T.reset;
  const db=document.getElementById('donateBtn');if(db)db.textContent=T.donate;
  showRanking();
}

/* ══════════════════════════════════
   定数 / 状態
══════════════════════════════════ */
const ROWS=8,COLS=7,NEED=4;
let grid=[],score=0,timeLeft=60;
let running=false,busy=false,timer=null;
let muted=false;

const el=id=>document.getElementById(id);
const rand=()=>Math.floor(Math.random()*6);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* ══════════════════════════════════
   SVGお菓子ブロック (6種) — かわいく美味しそうなデザイン
══════════════════════════════════ */
const COOKIE_SVG=[
  /* 0: チョコチップクッキー */
  `<svg viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="c0g" cx="40%" cy="35%">
        <stop offset="0%" stop-color="#f0b060"/>
        <stop offset="100%" stop-color="#c87830"/>
      </radialGradient>
    </defs>
    <circle cx="27" cy="27" r="23" fill="#b86820" opacity=".3"/>
    <circle cx="27" cy="26" r="23" fill="url(#c0g)"/>
    <circle cx="20" cy="21" r="3.5" fill="#5a3010"/>
    <circle cx="33" cy="19" r="2.8" fill="#5a3010"/>
    <circle cx="18" cy="32" r="2.5" fill="#5a3010"/>
    <circle cx="32" cy="32" r="3" fill="#5a3010"/>
    <circle cx="27" cy="26" r="2" fill="#5a3010"/>
    <circle cx="20" cy="21" r="1.2" fill="#8b5a28" opacity=".6"/>
    <circle cx="33" cy="19" r="1" fill="#8b5a28" opacity=".6"/>
    <ellipse cx="18" cy="19" rx="5" ry="3" fill="#fff" opacity=".15" transform="rotate(-20 18 19)"/>
  </svg>`,

  /* 1: カップケーキ */
  `<svg viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="c1g" cx="40%" cy="30%">
        <stop offset="0%" stop-color="#ffeef5"/>
        <stop offset="100%" stop-color="#f8c0d8"/>
      </radialGradient>
      <radialGradient id="c1b" cx="50%" cy="40%">

function makeCookieEl(type){
  const w=document.createElement('div');
  w.style.cssText='width:50px;height:50px;display:flex;align-items:center;justify-content:center;pointer-events:none;';

  return w;

/* ══════════════════════════════════
   効果音
══════════════════════════════════ */
let sfxCtx=null;
function getSfx(){
  if(!sfxCtx||sfxCtx.state==='closed')sfxCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(sfxCtx.state==='suspended')sfxCtx.resume();
  return sfxCtx;
}
function tone(freq,dur,vol,type,delay,dest){
  if(muted)return;
  const c=getSfx();if(!dest)dest=c.destination;
  const o=c.createOscillator(),g=c.createGain();
  const t=c.currentTime+(delay||0);
  o.type=type||'sine';o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol||0.06,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.12));
  o.connect(g);g.connect(dest);o.start(t);o.stop(t+(dur||0.12));
}
function playClear(n){
  if(muted)return;
  const c=getSfx();const mg=c.createGain();mg.gain.value=0.34;mg.connect(c.destination);
  const base=560+(n||0)*80;
  [1,1.26,1.5,2].forEach((r,i)=>{
    tone(base*r,0.14,0.5,'sine',i*0.055,mg);
    tone(base*r*2,0.09,0.18,'triangle',i*0.055+0.02,mg);
  });
  tone(base*2.5,0.3,0.2,'sine',0.23,mg);
}
function playCombo(n){
  if(muted)return;
  const c=getSfx();const mg=c.createGain();mg.gain.value=0.3;mg.connect(c.destination);
  const sc=[523,659,784,1047,1319];const top=Math.min(n,sc.length-1);
  for(let i=0;i<=top;i++){
    tone(sc[i],0.18,0.5,'sine',i*0.07,mg);
    tone(sc[i]*1.5,0.1,0.2,'triangle',i*0.07+0.01,mg);
  }
}
function playOver(){
  if(muted)return;
  [440,392,349,294,261].forEach((f,i)=>tone(f,0.28,0.06,'sine',i*0.12));
}

/* ══════════════════════════════════
   BGM — look-ahead scheduler
   ・通常テンポ: BPM148 (長いフレーズ32拍)
   ・残り10秒:  BPM200 に切り替え
══════════════════════════════════ */
let bgmAC=null,bgmTick=null,bgmNext=0,bgmActiveBPM=0;
const SCHED_AHEAD=0.35,SCHED_TICK=50;

function bgmBPM(){
  /* タイム残り10秒以下でのみ加速 */
  return (running&&timeLeft<=10)?200:148;
}

function schedNote(ac,dest,type,freq,startT,durT,vol){
  try{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,startT);
    g.gain.exponentialRampToValueAtTime(0.0001,startT+durT);
    o.connect(g);g.connect(dest);o.start(startT);o.stop(startT+durT);
  }catch(e){}
}

function schedLoop(ac,startT,beat){
  const gM=ac.createGain();gM.gain.value=0.09;gM.connect(ac.destination);
  const gC=ac.createGain();gC.gain.value=0.045;gC.connect(ac.destination);
  const gB=ac.createGain();gB.gain.value=0.085;gB.connect(ac.destination);
  const gH=ac.createGain();gH.gain.value=0.028;gH.connect(ac.destination);
  const gK=ac.createGain();gK.gain.value=0.10;gK.connect(ac.destination);

  /* 32拍メロディ — かわいくポップなフレーズ */
  const mel=[
    [523,.5],[659,.5],[784,1],[659,.5],[523,.5],[392,1],[440,.5],[523,.5],
    [659,1],[784,.5],[880,.5],[784,1],[659,.5],[523,.5],[392,2],
    [440,.5],[523,.5],[659,1],[784,.5],[880,.5],[1047,1],[880,.5],[784,.5],
    [659,1],[523,.5],[440,.5],[523,1],[392,.5],[330,.5],[392,1],[523,2],
  ];
  /* ハーモニー */
  const har=mel.map(([f,d])=>[f*1.26,d]);
  /* ベース */
  const bass=[
    [131,1],[165,1],[196,1],[175,1],[131,1],[165,1],[131,2],
    [165,1],[196,1],[220,1],[196,1],[165,1],[131,1],[98,2],
    [110,1],[131,1],[165,1],[196,1],[220,1],[261,1],[220,1],[196,1],
    [165,1],[131,1],[110,1],[131,1],[98,1],[82,1],[98,1],[131,2],
  ];

  const totalBeats=mel.reduce((s,[,d])=>s+d,0);

  [[mel,gM,'sine'],[har,gC,'triangle'],[bass,gB,'triangle']].forEach(([notes,dest,type])=>{
    let t=startT;
    notes.forEach(([f,d])=>{
      schedNote(ac,dest,type,f,t,d*beat*0.80,0.55);
      t+=d*beat;
    });
  });

  /* ドラム (8分ステップ) */
  const steps=totalBeats*2;
  for(let i=0;i<steps;i++){
    const t=startT+i*beat*0.5;
    schedNote(ac,gH,'sawtooth',9000+Math.random()*4000,t,0.015,i%2===0?0.40:0.14);
    if(i%4===0){schedNote(ac,gK,'sine',80,t,0.17,0.80);schedNote(ac,gK,'sine',55,t+0.01,0.19,0.50);}
    if(i%4===2)schedNote(ac,gH,'sawtooth',220+Math.random()*80,t,0.07,0.28);
  }
  return totalBeats*beat;
}

function bgmScheduler(){
  if(!bgmAC||bgmAC.state==='closed')return;
  const bpm=bgmActiveBPM,beat=60/bpm;
  while(bgmNext<bgmAC.currentTime+SCHED_AHEAD){
    bgmNext+=schedLoop(bgmAC,bgmNext,beat);
  }
}

function startBGM(){
  stopBGM();if(muted)return;
  bgmActiveBPM=bgmBPM();
  bgmAC=new(window.AudioContext||window.webkitAudioContext)();
  bgmNext=bgmAC.currentTime+0.05;
  bgmScheduler();
  bgmTick=setInterval(bgmScheduler,SCHED_TICK);
}

function stopBGM(){
  if(bgmTick){clearInterval(bgmTick);bgmTick=null;}
  if(bgmAC){try{bgmAC.close();}catch(e){}bgmAC=null;}
  bgmActiveBPM=0;
}

/* 残り10秒切りでBPM切り替え */
function checkBGMTempo(){
  const needed=bgmBPM();
  if(running&&!muted&&needed!==bgmActiveBPM)startBGM();
}

function toggleMute(){
  muted=!muted;
  ['muteBtn','muteBtn-m'].forEach(id=>{
    const b=el(id);if(!b)return;
    b.textContent=muted?'🔇':'🔊';b.classList.toggle('muted',muted);
  });
  if(muted)stopBGM();else if(running)startBGM();
}

/* ══════════════════════════════════
   グリッド
══════════════════════════════════ */
function createGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++)grid[r][c]=rand();}
}

function render(dropSet){
  const g=el('grid');g.innerHTML='';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const val=grid[r][c],d=document.createElement('div');
      if(val===-1){
        d.className='cell-empty';
      }else{
        d.className='cell';
        if(dropSet&&dropSet.has(r+','+c))d.classList.add('drop');
        d.appendChild(makeCookieEl(val));
        d.onclick=clickCell;d.dataset.r=r;d.dataset.c=c;
      }
      g.appendChild(d);
    }
  }
}

function findMatch(){
  const seen=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  const set=new Set();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]===-1||seen[r][c])continue;
      const type=grid[r][c],stack=[[r,c]],group=[];
      seen[r][c]=true;
      while(stack.length){
        const[y,x]=stack.pop();group.push([y,x]);
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dy,dx])=>{
          const ny=y+dy,nx=x+dx;
          if(ny>=0&&nx>=0&&ny<ROWS&&nx<COLS&&!seen[ny][nx]&&grid[ny][nx]===type){
            seen[ny][nx]=true;stack.push([ny,nx]);
          }
        });
      }
      if(group.length>=NEED)group.forEach(([y,x])=>set.add(y+','+x));
    }
  }
  return set;
}

function gravity(){
  const drop=new Set();
  for(let c=0;c<COLS;c++){
    let w=ROWS-1;
    for(let r=ROWS-1;r>=0;r--){
      if(grid[r][c]!==-1){grid[w][c]=grid[r][c];if(w!==r)drop.add(w+','+c);w--;}
    }
    for(let r=w;r>=0;r--){grid[r][c]=rand();drop.add(r+','+c);}
  }
  return drop;
}

function getCellEl(r,c){
  return el('grid').querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

/* タイム回復 */
function timeBonus(hitSize,chainN){
  const mul=[0,0.45,0.8,1.3,2.0,3.0];
  return hitSize*mul[Math.min(chainN,mul.length-1)];
}

/* ══════════════════════════════════
   クリック → 落下 → 連鎖
══════════════════════════════════ */
async function clickCell(e){
  if(!running||busy)return;busy=true;
  const r=+e.currentTarget.dataset.r,c=+e.currentTarget.dataset.c;
  const cellEl=getCellEl(r,c);
  if(cellEl){const rect=cellEl.getBoundingClientRect();spawnSparks(rect.left+rect.width/2,rect.top+rect.height/2,4);}
  playClear(0);grid[r][c]=-1;timeLeft=Math.max(0,timeLeft-1);render(null);
  await sleep(160);const drop=gravity();render(drop);
  await sleep(300);await chain(1);busy=false;
}

async function chain(n){
  const hit=findMatch();if(hit.size===0)return;
  showCombo(n);if(n>1)playCombo(n);
  hit.forEach(k=>{
    const[r,c]=k.split(',').map(Number);
    const cellEl=getCellEl(r,c);
    if(!cellEl)return;
    const rect=cellEl.getBoundingClientRect();
    spawnSparks(rect.left+rect.width/2,rect.top+rect.height/2,5);
    grid[r][c]=-1;
  });
  playClear(n-1);render(null);
  score+=hit.size;
  timeLeft=Math.min(60,timeLeft+timeBonus(hit.size,n));
  updateUI();checkMilestone();checkBGMTempo();
  await sleep(480);const drop=gravity();render(drop);
  await sleep(300);await chain(n+1);
}

  const d=el('combo');

  requestAnimationFrame(()=>{

function spawnSparks(x,y,num){
  const icons=['✨','⭐','💫','🌟','🎉','🍬'];const p=el('particles');
  for(let i=0;i<(num||5);i++){
    const s=document.createElement('div');s.className='spark';
    s.textContent=icons[Math.floor(Math.random()*icons.length)];
    s.style.left=(x+(Math.random()-.5)*60)+'px';s.style.top=(y+(Math.random()-.5)*30)+'px';
    p.appendChild(s);setTimeout(()=>s.remove(),900);
  }
}

/* ══════════════════════════════════
   UI / タイマー
══════════════════════════════════ */
function updateUI(){
  const t=Math.ceil(timeLeft),pct=timeLeft/60*100;
  const bg=pct>40?'linear-gradient(90deg,#f4845f,#e8bc5a)':
           pct>20?'linear-gradient(90deg,#e87040,#e05a2a)':
                  'linear-gradient(90deg,#e02020,#c01010)';
  el('score').textContent=score;el('time').textContent=t;
  el('fill').style.width=pct+'%';el('fill').style.background=bg;
  const sm=el('score-m'),tm=el('time-m'),fm=el('fill-m');
  if(sm)sm.textContent=score;if(tm)tm.textContent=t;
  if(fm){fm.style.width=pct+'%';fm.style.background=bg;}
  /* ピンチ演出 */
  const danger=running&&timeLeft<=10;
  ['time','time-m'].forEach(id=>{const e=el(id);if(e)e.classList.toggle('danger',danger);});
  document.body.style.background=danger?'linear-gradient(135deg,#fdf4e7 60%,#ffe0e0 100%)':'';
}

function decayRate(){
  if(score>=300)return 1.90;if(score>=200)return 1.55;if(score>=100)return 1.25;return 1.0;
}

function startGame(){
  if(running)return;getSfx().resume();running=true;
  const T=LANGS[lang];
  el('startBtn').disabled=true;el('startBtn').textContent=T.playing;
  const sbm=el('startBtn-m');if(sbm){sbm.disabled=true;sbm.textContent=T.playing;}
  startBGM();
  timer=setInterval(()=>{
    timeLeft-=0.1*decayRate();
    if(timeLeft<=0){timeLeft=0;updateUI();endGame();return;}
    updateUI();checkBGMTempo();
  },100);
}

function endGame(){
  running=false;clearInterval(timer);stopBGM();playOver();
  document.body.style.background='';
  ['time','time-m'].forEach(id=>{const e=el(id);if(e)e.classList.remove('danger');});
  const prevHigh=+localStorage.getItem('cookieHigh')||0;
  const isNewRecord=score>prevHigh;
  saveScore();
  el('final').textContent=score;
  const badge=el('go-title-badge');if(badge)badge.textContent=getTitle(score);
  showRanking();el('gameover').classList.add('show');
  if(isNewRecord&&score>0)setTimeout(showNewRecord,400);
}

/* ══════════════════════════════════
   称号 (リザルト画面のみ)
══════════════════════════════════ */
function getTitle(s){
  const list=[...LANGS[lang].titles].reverse();
  for(const[min,name]of list){if(s>=min)return name;}
  return LANGS[lang].titles[0][1];
}

/* マイルストーン */
const MILESTONES=[30,60,100,140,180,230,280,340,400,470,550,640,740,850,970,1000,1100,1250,1400,1600,1800,2000];
let lastMilestone=0;
function checkMilestone(){
  const T=LANGS[lang];
  for(const m of MILESTONES){
    if(score>=m&&lastMilestone<m){lastMilestone=m;showMilestone(T.milestone(m));return;}
  }
}
function showMilestone(text){
  const d=el('milestone-msg');
  d.textContent=text;d.style.transition='none';d.style.opacity='1';
  d.style.transform='translate(-50%,-50%) scale(1.1)';
  setTimeout(()=>{
    d.style.transition='opacity .8s,transform .8s';
    d.style.opacity='0';d.style.transform='translate(-50%,-60%) scale(.9)';
  },900);
}

/* NEW RECORD */
function showNewRecord(){
  const d=el('new-record');
  d.textContent=LANGS[lang].newRecord;d.style.transition='none';d.style.opacity='1';
  d.style.transform='translate(-50%,-50%) scale(1.15)';
  setTimeout(()=>{
    d.style.transition='opacity 1s,transform 1s';
    d.style.opacity='0';d.style.transform='translate(-50%,-65%) scale(.9)';
  },1200);
  launchConfetti();
}
function launchConfetti(){
  const cols=['#f4845f','#e8bc5a','#6ec6a0','#90caf9','#ce93d8','#f48fb1'];
  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const s=document.createElement('div');s.className='confetti';
      s.style.left=Math.random()*100+'vw';
      s.style.background=cols[Math.floor(Math.random()*cols.length)];
      s.style.width=(8+Math.random()*8)+'px';s.style.height=(8+Math.random()*8)+'px';
      s.style.animationDuration=(1.5+Math.random()*2)+'s';
      document.body.appendChild(s);setTimeout(()=>s.remove(),4000);
    },i*40);
  }
}

/* ══════════════════════════════════
   スコア保存 / ランキング / シェア
══════════════════════════════════ */
function saveScore(){
  let hs=+localStorage.getItem('cookieHigh')||0;
  if(score>hs)localStorage.setItem('cookieHigh',score);
  let arr=JSON.parse(localStorage.getItem('cookieRank')||'[]');
  arr.push(score);arr.sort((a,b)=>b-a);
  localStorage.setItem('cookieRank',JSON.stringify(arr.slice(0,5)));
}
function loadScore(){
  const v=localStorage.getItem('cookieHigh')||0;
  el('high').textContent=v;const hm=el('high-m');if(hm)hm.textContent=v;
}
function showRanking(){
  const arr=JSON.parse(localStorage.getItem('cookieRank')||'[]');
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣'];const suf=LANGS[lang].rankSuffix;
  el('ranking').innerHTML=arr.length?arr.map((v,i)=>`${medals[i]} ${v}${suf}`).join('<br>'):'';
  loadScore();
}
function shareX(){
  const T=LANGS[lang];const title=getTitle(score);
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(T.shareTitle(score,title)),'_blank','noopener');
}

/* ══════════════════════════════════
   リセット
══════════════════════════════════ */
function resetGame(){
  clearInterval(timer);stopBGM();
  running=false;busy=false;score=0;timeLeft=60;lastMilestone=0;
  document.body.style.background='';
  el('gameover').classList.remove('show');
  el('startBtn').disabled=false;el('startBtn').textContent=LANGS[lang].start;
  const sbm2=el('startBtn-m');if(sbm2){sbm2.disabled=false;sbm2.textContent=LANGS[lang].start;}
  createGrid();
  let n=0;while(findMatch().size>0&&n++<20)createGrid();
  render();updateUI();loadScore();
}

/* ══════════════════════════════════
   初期化 & スケール
══════════════════════════════════ */
resetGame();applyLang();

/* PC・スマホ両対応 viewport fit
   グリッドネイティブサイズ: 60×7 + 5×6 = 450px (W), 60×8 + 5×7 = 515px (H)
   wrapper padding 8px → 内部 450×515
   wrapper外サイズ: 450+16=466 × 515+16=531
*/
const GW_INNER_W=60*7+5*6;  /* 450 */
const GW_INNER_H=60*8+5*7;  /* 515 */
const GW_PAD=8;
const GW_W=GW_INNER_W+GW_PAD*2; /* 466 */
const GW_H=GW_INNER_H+GW_PAD*2; /* 531 */

function scaleGrid(){
  const gw=el('grid-wrapper');
  const vw=window.innerWidth;
  const vh=window.innerHeight;
  const isMobile=vw<=600;

  if(isMobile){
    /* ── スマホ: 全要素の高さを実測して残りをグリッドに割り当て ── */
    /* いったんscaleをリセットしてから他要素の高さを取得 */
    gw.style.transform='scale(1)';
    gw.style.marginBottom='0';

    const logoH  = (el('title-logo')||{offsetHeight:40}).offsetHeight;
    const panelH = (document.querySelector('.panel-mobile')||{offsetHeight:130}).offsetHeight;
    const donateH= (el('donateBtn')||{offsetHeight:0}).offsetHeight;
    const gaps   = 4+4+6+4; /* game-area gap + 各margin */

    const availW = vw - 20;          /* 左右10pxずつ */
    const availH = vh - logoH - panelH - donateH - gaps - 40; /* 40=lang+余裕 */

    const sW = availW / GW_W;
    const sH = availH / GW_H;
    const s  = Math.min(sW, sH, 0.99); /* 1未満に抑える */

    gw.style.transformOrigin = 'top center';
    gw.style.transform = 'scale('+s+')';
    gw.style.width  = GW_W+'px';
    gw.style.height = GW_H+'px';
    gw.style.marginBottom = -(GW_H - Math.round(GW_H*s))+'px';
    gw.style.marginRight  = '';

  }else{
    /* ── PC ── */
    const logoEl=el('title-logo');
    const logoH=logoEl?logoEl.offsetHeight+8:70;
    const availW=vw-148-20-40;
    const availH=vh-logoH-24;
    const s=Math.min(availW/GW_W, availH/GW_H, 1);

    gw.style.transformOrigin='top left';
    gw.style.transform='scale('+s+')';
    gw.style.width  = GW_W+'px';
    gw.style.height = GW_H+'px';
    const scaledH=Math.round(GW_H*s);
    const scaledW=Math.round(GW_W*s);
    gw.style.marginBottom=-(GW_H-scaledH)+'px';
    gw.style.marginRight =-(GW_W-scaledW)+'px';
  }
}

scaleGrid();
window.addEventListener('resize',scaleGrid);
/* ロゴのフォント読み込み後に再計算 */
document.fonts.ready.then(scaleGrid);
</script>
