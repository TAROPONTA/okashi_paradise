<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🍪 Cookie Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fdf4e7;
  --accent:#f4845f;
  --accent2:#6ec6a0;
  --text:#3d2b1f;
  --muted:#c4956a;
}
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow:auto;
  padding:20px;
}

body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 12% 18%,#fde8d8 0%,transparent 42%),
    radial-gradient(circle at 88% 78%,#dff5ea 0%,transparent 42%);
  z-index:0;pointer-events:none;
}

/* ── 言語切り替えボタン ── */
#lang-switch{
  position:fixed;
  top:14px;left:14px;
  z-index:200;
  display:flex;gap:6px;
}
.lang-btn{
  border:2px solid var(--accent);
  border-radius:10px;
  padding:4px 10px;
  font-family:'Fredoka One',cursive;
  font-size:.85rem;
  cursor:pointer;
  background:#fff8f0;
  color:var(--accent);
  transition:background .15s,color .15s;
}
.lang-btn.active{
  background:var(--accent);
  color:#fff;
}

/* ════ PC レイアウト ════ */
.container{
  position:relative;z-index:1;
  width:max-content;
  margin:0 auto;
  display:flex;flex-direction:column;
  align-items:center;gap:18px;
  padding-bottom:24px;
}

h1{
  font-family:'Fredoka One',cursive;
  font-size:2.4rem;color:var(--accent);
  text-shadow:3px 3px 0 #fde0d0;
}

/* PC: グリッド＋パネル横並び */
.wrap{
  display:flex;gap:24px;
  align-items:flex-start;
  flex-wrap:wrap;justify-content:center;
}

/* グリッドをwrapperで包んでscaleのズレを吸収 */
#grid-wrapper{
  display:flex;
  align-items:flex-start;
}

#grid{
  display:grid;
  grid-template-columns:repeat(7,66px);
  grid-template-rows:repeat(9,66px);
  gap:6px;
  transform-origin:top left;
}

.cell{
  width:66px;height:66px;
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;
  cursor:pointer;user-select:none;
  background:transparent;
  filter:drop-shadow(0 3px 5px rgba(120,60,0,.2));
  transition:transform .12s,filter .12s;
  -webkit-tap-highlight-color:transparent;
}
.cell:hover{
  transform:scale(1.14) rotate(-4deg);
  filter:drop-shadow(0 6px 10px rgba(120,60,0,.3));
}
.cell:active{transform:scale(.92)}

.cell-empty{
  width:66px;height:66px;
  visibility:hidden;
  pointer-events:none;
}

.cell.drop{animation:dropIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes dropIn{
  from{transform:translateY(-66px) scale(.7);opacity:0}
  to  {transform:translateY(0)     scale(1); opacity:1}
}

/* ── PC パネル（グリッド右側の縦並び） ── */
.panel{
  width:164px;
  display:flex;flex-direction:column;gap:12px;
}
/* スマホ用パネルは初期非表示 */
.panel-mobile{display:none}

.label{font-size:.78rem;color:var(--muted);font-weight:800;letter-spacing:1px;text-transform:uppercase}
.value{font-family:'Fredoka One',cursive;font-size:2.4rem;color:var(--accent);text-shadow:2px 2px 0 #fde0d0}

.timerbar{height:16px;border-radius:999px;background:rgba(180,120,60,.15);overflow:hidden}
#fill,#fill-m{height:100%;width:100%;background:linear-gradient(90deg,#f4845f,#e8bc5a);transition:.15s linear}

.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(180,120,60,.2),transparent)}

.btn{
  border:none;border-radius:14px;padding:12px;
  cursor:pointer;
  font-family:'Fredoka One',cursive;font-size:1rem;
  color:#fff;background:var(--accent);
  box-shadow:0 4px 0 #c95c3a;
  transition:transform .1s,box-shadow .1s;
  -webkit-tap-highlight-color:transparent;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 #c95c3a}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c95c3a}
.btn.green{background:var(--accent2);box-shadow:0 4px 0 #4a9f7a}
.btn.green:hover{box-shadow:0 6px 0 #4a9f7a}
.btn.green:active{box-shadow:0 2px 0 #4a9f7a}
.btn.x-btn{background:#000;box-shadow:0 4px 0 #333}
.btn.x-btn:hover{box-shadow:0 6px 0 #333}
.btn.x-btn:active{box-shadow:0 2px 0 #333}

#muteBtn,#muteBtn-m{font-size:1.3rem;padding:8px;opacity:1;transition:opacity .2s}
#muteBtn.muted,#muteBtn-m.muted{opacity:.5}

/* ── コンボ ── */
#combo{
  position:fixed;left:50%;top:44%;
  transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive;font-size:3.2rem;
  color:var(--accent);
  text-shadow:3px 3px 0 #fff,5px 5px 0 #fde0d0;
  opacity:0;pointer-events:none;z-index:50;
}

/* ── パーティクル ── */
#particles{position:fixed;inset:0;pointer-events:none;z-index:45;overflow:hidden}
.spark{
  position:absolute;font-size:1.6rem;
  animation:fly .85s ease-out forwards;pointer-events:none;
}
@keyframes fly{
  0%  {opacity:1;transform:translateY(0) rotate(0deg) scale(1)}
  100%{opacity:0;transform:translateY(-90px) rotate(30deg) scale(.3)}
}

/* ── ゲームオーバー ── */
#gameover{
  position:fixed;inset:0;display:none;
  background:rgba(255,248,240,.95);backdrop-filter:blur(6px);
  z-index:60;justify-content:center;align-items:center;flex-direction:column;gap:14px;
}
#gameover.show{display:flex}
#gameover h2{font-family:'Fredoka One',cursive;font-size:3rem;color:var(--accent);text-shadow:3px 3px 0 #fde0d0}
#final{font-family:'Fredoka One',cursive;font-size:4.2rem;color:var(--text)}
.go-label{font-size:.8rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px}
#ranking{text-align:center;line-height:2;font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--muted);}
.go-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* ════════════════════════════════
   スマホレイアウト
   グリッドをscaleで縮小し、パネルを下部横並びに切り替え
════════════════════════════════ */
@media(max-width:600px){
  body{padding:8px 4px 120px;}

  #lang-switch{top:8px;left:8px;}

  h1{font-size:1.6rem;margin-top:32px;}

  /* PC用パネルを非表示 */
  .panel{display:none}
  /* スマホ用パネルを表示 */
  .panel-mobile{
    display:flex;
    flex-direction:column;
    gap:8px;
    width:100%;
    max-width:520px;
    padding:0 4px;
  }

  /* スコア行: 食べた数・ハイスコア・タイム横並び */
  .mob-stats{
    display:flex;gap:8px;justify-content:space-between;align-items:flex-end;
  }
  .mob-stat{
    flex:1;text-align:center;
  }
  .mob-stat .label{font-size:.65rem;}
  .mob-stat .value{font-size:1.7rem;}

  /* タイマーバー */
  .mob-timer{width:100%;}

  /* ボタン行 */
  .mob-btns{
    display:flex;gap:8px;
  }
  .mob-btns .btn{flex:1;padding:10px 4px;font-size:.9rem;}

  /* グリッドをscaleで自動縮小
     66px×7col + 6px×6gap = 498px が元サイズ
     wrapperはscale後の実際の幅に縮む */
  #grid-wrapper{
    width:100%;
    display:flex;
    justify-content:center;
  }
  #grid{
    transform-origin:top center;
    /* JS側でscaleを動的にセット */
  }

  /* ドネートボタンをスマホでは小さく下部中央に */
  #donateBtn{
    right:auto!important;
    left:50%!important;
    transform:translateX(-50%)!important;
    bottom:10px!important;
    font-size:.8rem!important;
    padding:8px 14px!important;
  }

  #combo{font-size:2rem;}
}
</style>
</head>
<body>

<!-- 言語切り替え -->
<div id="lang-switch">
  <button class="lang-btn active" onclick="setLang('ja')">JP</button>
  <button class="lang-btn"        onclick="setLang('en')">EN</button>
</div>

<div id="combo"></div>
<div id="particles"></div>

<div class="container">
  <h1 id="txt-title">🍪 クッキーパズル</h1>
  <div class="wrap">
    <!-- グリッド -->
    <div id="grid-wrapper">
      <div id="grid"></div>
    </div>

    <!-- PC用パネル（右側縦並び） -->
    <div class="panel">
      <div class="label" id="txt-score-label">食べた数</div>
      <div class="value" id="score">0</div>
      <div class="label" id="txt-high-label">ハイスコア</div>
      <div class="value" id="high">0</div>
      <div class="sep"></div>
      <div class="label" id="txt-time-label">タイム</div>
      <div class="timerbar"><div id="fill"></div></div>
      <div class="value" id="time" style="font-size:2rem">60</div>
      <div class="sep"></div>
      <button class="btn"       onclick="startGame()" id="startBtn">▶ スタート</button>
      <button class="btn green" onclick="resetGame()" id="resetBtn">↺ リセット</button>
      <button class="btn"       onclick="toggleMute()" id="muteBtn">🔊</button>
    </div>
  </div>

  <!-- スマホ用パネル（グリッド下・横並び） -->
  <div class="panel-mobile">
    <div class="mob-stats">
      <div class="mob-stat">
        <div class="label" id="txt-score-label-m">食べた数</div>
        <div class="value" id="score-m">0</div>
      </div>
      <div class="mob-stat">
        <div class="label" id="txt-high-label-m">ハイスコア</div>
        <div class="value" id="high-m">0</div>
      </div>
      <div class="mob-stat">
        <div class="label" id="txt-time-label-m">タイム</div>
        <div class="value" id="time-m" style="font-size:1.7rem">60</div>
      </div>
    </div>
    <div class="mob-timer timerbar"><div id="fill-m"></div></div>
    <div class="mob-btns">
      <button class="btn"       onclick="startGame()" id="startBtn-m">▶ スタート</button>
      <button class="btn green" onclick="resetGame()" id="resetBtn-m">↺ リセット</button>
      <button class="btn"       onclick="toggleMute()" id="muteBtn-m">🔊</button>
    </div>
  </div>
</div>

<div id="gameover">
  <h2 id="txt-go-title">🍪 ゲームオーバー！</h2>
  <div class="go-label" id="txt-go-score">今回のスコア</div>
  <div id="final">0</div>
  <div id="ranking"></div>
  <div class="go-btns">
    <button class="btn"   onclick="resetGame()" id="txt-go-retry">もう一度 🍪</button>
    <button class="btn x-btn" onclick="shareX()" id="txt-go-share">𝕏 シェア</button>
  </div>
</div>

<script>
/* ════════════════════════════════
   多言語テキスト
════════════════════════════════ */
const LANGS={
  ja:{
    title:'🍪 クッキーパズル',
    scoreLabel:'食べた数',
    highLabel:'ハイスコア',
    timeLabel:'タイム',
    start:'▶ スタート',
    playing:'⏳ プレイ中',
    reset:'↺ リセット',
    goTitle:'🍪 ゲームオーバー！',
    goScore:'今回のスコア',
    goRetry:'もう一度 🍪',
    goShare:'𝕏 シェア',
    rankSuffix:' 個',
    shareText:(s)=>`#クッキーパズル\nお菓子を${s}個食べたよ！🍪\nあなたは何個食べられるかな？`,
    donate:'☕ おやつ代をあげる',
  },
  en:{
    title:'🍪 Cookie Puzzle',
    scoreLabel:'Cookies Eaten',
    highLabel:'High Score',
    timeLabel:'Time',
    start:'▶ Start',
    playing:'⏳ Playing',
    reset:'↺ Reset',
    goTitle:'🍪 Game Over!',
    goScore:'Your Score',
    goRetry:'Play Again 🍪',
    goShare:'𝕏 Share',
    rankSuffix:'',
    shareText:(s)=>`#CookiePuzzle\nI ate ${s} cookies! 🍪\nCan you beat my score?`,
    donate:'☕ Buy me a snack',
  }
};

let lang='ja';

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===(l==='ja'?'JP':'EN')));
  applyLang();
}

function applyLang(){
  const T=LANGS[lang];
  document.getElementById('txt-title').textContent       = T.title;
  document.getElementById('txt-score-label').textContent = T.scoreLabel;
  document.getElementById('txt-high-label').textContent  = T.highLabel;
  document.getElementById('txt-time-label').textContent  = T.timeLabel;
  document.getElementById('txt-go-title').textContent    = T.goTitle;
  document.getElementById('txt-go-score').textContent    = T.goScore;
  document.getElementById('txt-go-retry').textContent    = T.goRetry;
  document.getElementById('txt-go-share').textContent    = T.goShare;
  const sb=document.getElementById('startBtn');
  sb.textContent = running ? T.playing : T.start;
  document.getElementById('resetBtn').textContent = T.reset;
  const db=document.getElementById('donateBtn');
  if(db) db.textContent=T.donate;
  /* スマホパネルのラベルも更新 */
  const slm=document.getElementById('txt-score-label-m');
  const hlm=document.getElementById('txt-high-label-m');
  const tlm=document.getElementById('txt-time-label-m');
  const sbm=document.getElementById('startBtn-m');
  const rbm=document.getElementById('resetBtn-m');
  if(slm) slm.textContent=T.scoreLabel;
  if(hlm) hlm.textContent=T.highLabel;
  if(tlm) tlm.textContent=T.timeLabel;
  if(sbm) sbm.textContent=running?T.playing:T.start;
  if(rbm) rbm.textContent=T.reset;
  /* ランキング再描画（言語更新のため） */
  showRanking();
}

/* ════════════════════════════════
   定数 / 状態
════════════════════════════════ */
const ROWS=9, COLS=7, NEED=4;
const ITEMS=['🍪','🧁','🍩','🍰','🍫','🍬'];

let grid=[], score=0, timeLeft=60;
let running=false, busy=false, timer=null;
let muted=false;

/* BGMはAudioContextをまるごと管理 */
let bgmCtx=null, bgmInterval=null;

const el    = id => document.getElementById(id);
const rand  = () => Math.floor(Math.random()*ITEMS.length);
const sleep = ms => new Promise(r=>setTimeout(r,ms));

/* ════════════════════════════════
   Web Audio（効果音用）
════════════════════════════════ */
let sfxCtx=null;
function getSfxCtx(){
  if(!sfxCtx||sfxCtx.state==='closed')
    sfxCtx=new(window.AudioContext||window.webkitAudioContext)();
  return sfxCtx;
}

function tone(freq,dur=0.12,vol=0.06,type='sine',delay=0,dest=null){
  if(muted) return;
  const c=getSfxCtx();
  if(!dest) dest=c.destination;
  const o=c.createOscillator(), g=c.createGain();
  const t=c.currentTime+delay;
  o.type=type; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(dest);
  o.start(t); o.stop(t+dur);
}

function playClear(n=0){
  if(muted) return;
  const c=getSfxCtx();
  const mg=c.createGain(); mg.gain.value=0.36; mg.connect(c.destination);
  const base=560+n*80;
  [1,1.26,1.5,2].forEach((r,i)=>{
    tone(base*r,   0.14,0.5,'sine',     i*0.055,mg);
    tone(base*r*2, 0.09,0.18,'triangle',i*0.055+0.02,mg);
  });
  tone(base*2.5,0.3,0.2,'sine',0.23,mg);
}

function playCombo(n){
  if(muted) return;
  const c=getSfxCtx();
  const mg=c.createGain(); mg.gain.value=0.33; mg.connect(c.destination);
  const sc=[523,659,784,1047,1319];
  const top=Math.min(n,sc.length-1);
  for(let i=0;i<=top;i++){
    tone(sc[i],    0.18,0.5,'sine',     i*0.07,mg);
    tone(sc[i]*1.5,0.1, 0.2,'triangle',i*0.07+0.01,mg);
  }
}

function playOver(){
  if(muted) return;
  [440,392,349,294,261].forEach((f,i)=>tone(f,0.28,0.06,'sine',i*0.12));
}

/* ════════════════════════════════
   BGM: AudioContextをまるごと作り直す方式
   → stopBGM()でclose()すれば音が即座に止まる
════════════════════════════════ */
/* スコア段階に対応したBPM
   0〜99: 152  100〜199: 180  200〜299: 208  300〜: 236
*/
function bgmBPM(){
  if(score>=300) return 236;
  if(score>=200) return 208;
  if(score>=100) return 180;
  return 152;
}

function startBGM(bpm){
  stopBGM();          /* 既存を必ず先に完全停止 */
  if(muted) return;
  if(bpm===undefined) bpm=bgmBPM();

  bgmCtx=new(window.AudioContext||window.webkitAudioContext)();
  const c=bgmCtx;
  const BPM=bpm, beat=60/BPM;

  const mel=[
    [784,.5],[880,.5],[1047,1],[880,.5],[784,.5],
    [659,1 ],[784,1 ],[659,.5],[523,.5],
    [523,.5],[659,.5],[784,1 ],[880,.5],[1047,.5],
    [880,1 ],[784,1 ],[659,2 ],
    [880,.5],[1047,.5],[1175,1],[1047,.5],[880,.5],
    [784,1 ],[880,1 ],[784,.5],[659,.5],
    [659,.5],[784,.5],[880,1 ],[784,.5],[659,.5],
    [523,1 ],[659,1 ],[784,2 ],
  ];
  const cnt=mel.map(([f,d])=>[f*1.498,d]);
  const bass=[
    [196,.5],[196,.5],[196,1],[220,.5],[196,.5],
    [165,1 ],[196,1 ],[165,.5],[131,.5],
    [131,.5],[165,.5],[196,1],[220,.5],[261,.5],
    [220,1 ],[196,1 ],[165,2],
    [220,.5],[261,.5],[294,1],[261,.5],[220,.5],
    [196,1 ],[220,1 ],[196,.5],[165,.5],
    [165,.5],[196,.5],[220,1],[196,.5],[165,.5],
    [131,1 ],[165,1 ],[196,2],
  ];

  const totalBeats=mel.reduce((s,[,d])=>s+d,0);
  const loopSec=totalBeats*beat;

  const gMel=c.createGain(); gMel.gain.value=0.10; gMel.connect(c.destination);
  const gCnt=c.createGain(); gCnt.gain.value=0.05; gCnt.connect(c.destination);
  const gBas=c.createGain(); gBas.gain.value=0.09; gBas.connect(c.destination);
  const gHat=c.createGain(); gHat.gain.value=0.032;gHat.connect(c.destination);
  const gKik=c.createGain(); gKik.gain.value=0.11; gKik.connect(c.destination);

  function schedNotes(start,notes,dest,type='sine'){
    let t=start;
    notes.forEach(([f,d])=>{
      if(c.state==='closed') return;
      try{
        const o=c.createOscillator(), g=c.createGain();
        o.type=type; o.frequency.value=f;
        g.gain.setValueAtTime(0.55,t);
        g.gain.exponentialRampToValueAtTime(0.0001,t+d*beat*0.76);
        o.connect(g); g.connect(dest);
        o.start(t); o.stop(t+d*beat*0.76);
      }catch(e){}
      t+=d*beat;
    });
  }

  function schedDrum(start){
    const steps=totalBeats*2;
    for(let i=0;i<steps;i++){
      if(c.state==='closed') break;
      const t=start+i*beat*0.5;
      try{
        /* ハイハット */
        const oh=c.createOscillator(), gh=c.createGain();
        oh.type='sawtooth'; oh.frequency.value=10000+Math.random()*4000;
        gh.gain.setValueAtTime(i%2===0?0.42:0.16,t);
        gh.gain.exponentialRampToValueAtTime(0.0001,t+0.016);
        oh.connect(gh); gh.connect(gHat); oh.start(t); oh.stop(t+0.016);
        /* キック */
        if(i%4===0){
          [80,55].forEach((f,j)=>{
            const ok=c.createOscillator(), gk=c.createGain();
            ok.type='sine'; ok.frequency.value=f;
            gk.gain.setValueAtTime(j===0?0.85:0.55,t+j*0.01);
            gk.gain.exponentialRampToValueAtTime(0.0001,t+0.2);
            ok.connect(gk); gk.connect(gKik); ok.start(t+j*0.01); ok.stop(t+0.2);
          });
        }
        /* スネア */
        if(i%4===2){
          const os=c.createOscillator(), gs=c.createGain();
          os.type='sawtooth'; os.frequency.value=220+Math.random()*80;
          gs.gain.setValueAtTime(0.3,t); gs.gain.exponentialRampToValueAtTime(0.0001,t+0.08);
          os.connect(gs); gs.connect(gHat); os.start(t); os.stop(t+0.08);
        }
      }catch(e){}
    }
  }

  let nextStart=c.currentTime+0.05;
  function loop(){
    if(c.state==='closed') return;
    schedNotes(nextStart,mel, gMel,'sine');
    schedNotes(nextStart,cnt, gCnt,'triangle');
    schedNotes(nextStart,bass,gBas,'triangle');
    schedDrum(nextStart);
    nextStart+=loopSec;
  }

  loop(); loop();
  bgmInterval=setInterval(()=>{
    if(c.state==='closed'){ clearInterval(bgmInterval); bgmInterval=null; return; }
    loop();
  },(loopSec-0.3)*1000);
}

function stopBGM(){
  /* インターバルを止める */
  if(bgmInterval){ clearInterval(bgmInterval); bgmInterval=null; }
  /* AudioContextをcloseして即座に音を止める */
  if(bgmCtx){
    try{ bgmCtx.close(); }catch(e){}
    bgmCtx=null;
  }
}

function toggleMute(){
  muted=!muted;
  ['muteBtn','muteBtn-m'].forEach(id=>{
    const b=el(id); if(!b) return;
    b.textContent=muted?'🔇':'🔊';
    b.classList.toggle('muted',muted);
  });
  if(muted){ stopBGM(); } else { if(running) startBGM(); }
}

/* ════════════════════════════════
   グリッド
════════════════════════════════ */
function createGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++) grid[r][c]=rand();
  }
}

function render(dropSet=null){
  const g=el('grid');
  g.innerHTML='';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const val=grid[r][c];
      const d=document.createElement('div');
      if(val===-1){
        d.className='cell-empty';
      } else {
        d.className='cell';
        if(dropSet?.has(r+','+c)) d.classList.add('drop');
        d.textContent=ITEMS[val];
        d.onclick=clickCell;
        d.dataset.r=r; d.dataset.c=c;
      }
      g.appendChild(d);
    }
  }
}

function findMatch(){
  const seen=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  const set=new Set();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]===-1||seen[r][c]) continue;
      const type=grid[r][c];
      const stack=[[r,c]], group=[];
      seen[r][c]=true;
      while(stack.length){
        const[y,x]=stack.pop();
        group.push([y,x]);
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dy,dx])=>{
          const ny=y+dy,nx=x+dx;
          if(ny>=0&&nx>=0&&ny<ROWS&&nx<COLS&&!seen[ny][nx]&&grid[ny][nx]===type){
            seen[ny][nx]=true; stack.push([ny,nx]);
          }
        });
      }
      if(group.length>=NEED) group.forEach(([y,x])=>set.add(y+','+x));
    }
  }
  return set;
}

function gravity(){
  const drop=new Set();
  for(let c=0;c<COLS;c++){
    let w=ROWS-1;
    for(let r=ROWS-1;r>=0;r--){
      if(grid[r][c]!==-1){
        grid[w][c]=grid[r][c];
        if(w!==r) drop.add(w+','+c);
        w--;
      }
    }
    for(let r=w;r>=0;r--){ grid[r][c]=rand(); drop.add(r+','+c); }
  }
  return drop;
}

function getCellEl(r,c){
  return el('grid').querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

/* ════════════════════════════════
   タイム回復: 連鎖数が増えるほど大きくなる係数
   chain=1: ×0.6  chain=2: ×1.2  chain=3: ×2.0
   chain=4: ×3.0  chain≥5: ×4.5
════════════════════════════════ */
function timeBonus(hitSize, chainN){
  const mul=[0,0.6,1.2,2.0,3.0,4.5];
  const m=mul[Math.min(chainN,mul.length-1)];
  return hitSize*m;
}

/* ════════════════════════════════
   クリック: 1個消去 → 落下 → 連鎖
════════════════════════════════ */
async function clickCell(e){
  if(!running||busy) return;
  busy=true;

  const r=+e.currentTarget.dataset.r;
  const c=+e.currentTarget.dataset.c;

  const cellEl=getCellEl(r,c);
  if(cellEl){
    const rect=cellEl.getBoundingClientRect();
    spawnSparks(rect.left+rect.width/2, rect.top+rect.height/2, 4);
  }
  playClear(0);
  grid[r][c]=-1;
  timeLeft=Math.max(0,timeLeft-1);
  render(null);

  await sleep(160);
  const drop=gravity();
  render(drop);

  await sleep(300);
  await chain(1);
  busy=false;
}

/* ════════════════════════════════
   連鎖処理
════════════════════════════════ */
async function chain(n){
  const hit=findMatch();
  if(hit.size===0) return;

  showCombo(n);
  if(n>1) playCombo(n);

  hit.forEach(k=>{
    const[r,c]=k.split(',').map(Number);
    const cellEl=getCellEl(r,c);
    if(!cellEl) return;
    const rect=cellEl.getBoundingClientRect();
    spawnSparks(rect.left+rect.width/2, rect.top+rect.height/2, 5);
    grid[r][c]=-1;
  });

  playClear(n-1);
  render(null);

  const prevBPM=bgmBPM();
  score+=hit.size;
  /* 連鎖数に応じてタイム回復量が増加 */
  timeLeft=Math.min(60, timeLeft+timeBonus(hit.size, n));
  updateUI();
  /* スコアがBPM変化の閾値をまたいだらBGMを即切り替え */
  if(running && !muted && bgmBPM()!==prevBPM) startBGM();

  await sleep(480);
  const drop=gravity();
  render(drop);

  await sleep(300);
  await chain(n+1);
}

/* ════════════════════════════════
   コンボ表示
════════════════════════════════ */
function showCombo(n){
  const d=el('combo');
  d.style.transition='none';
  d.style.opacity='0';
  d.textContent=n+' CHAIN! 🔥';
  requestAnimationFrame(()=>{
    d.style.opacity='1';
    d.style.transform='translate(-50%,-50%) scale(1.15)';
    setTimeout(()=>{
      d.style.transition='opacity .65s, transform .65s';
      d.style.opacity='0';
      d.style.transform='translate(-50%,-63%) scale(.87)';
    },750);
  });
}

/* ════════════════════════════════
   パーティクル
════════════════════════════════ */
function spawnSparks(x,y,num=5){
  const icons=['✨','⭐','💫','🌟','🎉','🍬'];
  const p=el('particles');
  for(let i=0;i<num;i++){
    const s=document.createElement('div');
    s.className='spark';
    s.textContent=icons[Math.floor(Math.random()*icons.length)];
    s.style.left=(x+(Math.random()-.5)*60)+'px';
    s.style.top =(y+(Math.random()-.5)*30)+'px';
    p.appendChild(s);
    setTimeout(()=>s.remove(),900);
  }
}

/* ════════════════════════════════
   UI / タイマー
════════════════════════════════ */
function updateUI(){
  const t=Math.ceil(timeLeft);
  const pct=timeLeft/60*100;
  const bg=pct>40?'linear-gradient(90deg,#f4845f,#e8bc5a)':
           pct>20?'linear-gradient(90deg,#e87040,#e05a2a)':
                  'linear-gradient(90deg,#e02020,#c01010)';
  /* PC */
  el('score').textContent=score;
  el('time').textContent=t;
  el('fill').style.width=pct+'%';
  el('fill').style.background=bg;
  /* スマホ */
  const sm=el('score-m'), tm=el('time-m'), fm=el('fill-m'), hm=el('high-m');
  if(sm) sm.textContent=score;
  if(tm) tm.textContent=t;
  if(fm){fm.style.width=pct+'%';fm.style.background=bg;}
}

/* スコアに応じた時間減少係数
   0〜99:  ×1.0  100〜199: ×1.25
   200〜299: ×1.55  300〜: ×1.90
*/
function decayRate(){
  if(score>=300) return 1.90;
  if(score>=200) return 1.55;
  if(score>=100) return 1.25;
  return 1.0;
}

function startGame(){
  if(running) return;
  getSfxCtx().resume();
  running=true;
  const T=LANGS[lang];
  el('startBtn').disabled=true;
  el('startBtn').textContent=T.playing;
  const sbm=el('startBtn-m'); if(sbm){sbm.disabled=true;sbm.textContent=T.playing;}
  startBGM();
  timer=setInterval(()=>{
    timeLeft-=0.1*decayRate();
    if(timeLeft<=0){ timeLeft=0; updateUI(); endGame(); return; }
    updateUI();
  },100);
}

function endGame(){
  running=false;
  clearInterval(timer);
  stopBGM();
  playOver();
  saveScore();
  el('final').textContent=score;
  showRanking();
  el('gameover').classList.add('show');
}

/* ════════════════════════════════
   スコア保存 / ランキング
════════════════════════════════ */
function saveScore(){
  let hs=+localStorage.getItem('cookieHigh')||0;
  if(score>hs) localStorage.setItem('cookieHigh',score);
  let arr=JSON.parse(localStorage.getItem('cookieRank')||'[]');
  arr.push(score); arr.sort((a,b)=>b-a);
  localStorage.setItem('cookieRank',JSON.stringify(arr.slice(0,5)));
}

function loadScore(){
  const v=localStorage.getItem('cookieHigh')||0;
  el('high').textContent=v;
  const hm=el('high-m'); if(hm) hm.textContent=v;
}

function showRanking(){
  const arr=JSON.parse(localStorage.getItem('cookieRank')||'[]');
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣'];
  const suf=LANGS[lang].rankSuffix;
  el('ranking').innerHTML=arr.length
    ? arr.map((v,i)=>`${medals[i]} ${v}${suf}`).join('<br>')
    : '';
  loadScore();
}

/* ════════════════════════════════
   X シェア
════════════════════════════════ */
function shareX(){
  const text=LANGS[lang].shareText(score);
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text),'_blank','noopener');
}

/* ════════════════════════════════
   リセット: BGMを完全停止してから初期化
════════════════════════════════ */
function resetGame(){
  clearInterval(timer);
  stopBGM();            /* AudioContextをcloseして音を完全停止 */
  running=false; busy=false; score=0; timeLeft=60;
  el('gameover').classList.remove('show');
  el('startBtn').disabled=false;
  el('startBtn').textContent=LANGS[lang].start;
  const sbm2=el('startBtn-m'); if(sbm2){sbm2.disabled=false;sbm2.textContent=LANGS[lang].start;}
  createGrid();
  let n=0;
  while(findMatch().size>0&&n++<20) createGrid();
  render();
  updateUI();
  loadScore();
}

/* ════════════════════════════════
   初期化
════════════════════════════════ */
resetGame();
applyLang();

/* ════════════════════════════════
   スマホ: グリッドをviewport幅に合わせてscale
   元グリッドサイズ: 66×7 + 6×6 = 498px
════════════════════════════════ */
const GRID_NATIVE_W = 66*7 + 6*6; // 498px

function scaleGrid(){
  const grid = document.getElementById('grid');
  const wrapper = document.getElementById('grid-wrapper');
  const vw = window.innerWidth;
  if(vw <= 600){
    const avail = vw - 8; // 左右4pxずつのpadding分
    const s = Math.min(1, avail / GRID_NATIVE_W);
    grid.style.transform = 'scale(' + s + ')';
    // wrapperの高さをscale後の実高に合わせる
    const nativeH = 66*9 + 6*8; // 630px
    wrapper.style.width  = Math.round(GRID_NATIVE_W * s) + 'px';
    wrapper.style.height = Math.round(nativeH * s) + 'px';
    wrapper.style.overflow = 'hidden';
    // グリッドをwrapper左端に合わせる（transform-origin:top center なので中央揃え）
    grid.style.marginLeft = '0';
  } else {
    grid.style.transform = '';
    wrapper.style.width  = '';
    wrapper.style.height = '';
    wrapper.style.overflow = '';
  }
}

scaleGrid();
window.addEventListener('resize', scaleGrid);
</script>
