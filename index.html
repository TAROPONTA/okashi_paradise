<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🍪 クッキーパズル DX+</title>
<style>
body{font-family:sans-serif;background:#fdf4e7;text-align:center;margin:0;padding:20px}
#grid{display:grid;grid-template-columns:repeat(7,62px);gap:6px;justify-content:center;margin:20px auto}
.cell{
width:62px;height:62px;border-radius:16px;background:#fff8f2;
display:flex;align-items:center;justify-content:center;
font-size:2rem;cursor:pointer;user-select:none;
box-shadow:0 4px 8px rgba(0,0,0,.08);
transition:.12s;
}
.cell:hover{transform:scale(1.08)}
.cell.pop{animation:pop .35s forwards}
@keyframes pop{
0%{transform:scale(1);opacity:1}
100%{transform:scale(0);opacity:0}
}
#particles{
position:fixed;inset:0;pointer-events:none;
}
.spark{
position:absolute;
font-size:1.4rem;
animation:fly .8s forwards;
}
@keyframes fly{
0%{opacity:1;transform:translateY(0) scale(1)}
100%{opacity:0;transform:translateY(-80px) rotate(25deg) scale(.4)}
}
button{padding:10px 18px;border:none;border-radius:12px;cursor:pointer}
</style>
</head>
<body>

<h1>🍪 クッキーパズル DX+</h1>
<div>
<button onclick="startGame()">▶ スタート</button>
<button onclick="toggleMute()" id="mute">🔊</button>
</div>

<div id="grid"></div>
<div id="particles"></div>

<script>
const ROWS=9,COLS=7;
const ITEMS=['🍪','🧁','🍩','🍰','🍫','🍬'];

let grid=[];
let audioCtx=null;
let muted=false;
let bgmTimer=null;

/* =======================
AUDIO
======================= */
function ctx(){
if(!audioCtx){
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}
return audioCtx;
}

function tone(freq,dur=.15,vol=.04,type="sine",delay=0){
if(muted)return;
const c=ctx();
const now=c.currentTime+delay;

const o=c.createOscillator();
const g=c.createGain();

o.type=type;
o.frequency.value=freq;

g.gain.setValueAtTime(vol,now);
g.gain.exponentialRampToValueAtTime(.0001,now+dur);

o.connect(g);
g.connect(c.destination);

o.start(now);
o.stop(now+dur);
}

/* キラキラ効果音 */
function playClear(){
tone(620,.08,.05,"sine");
tone(880,.10,.04,"triangle",0.05);
tone(1240,.12,.03,"triangle",0.09);
}

/* BGM（元版に近いポップ調） */
function startBGM(){
stopBGM();

const notes=[
523,659,784,880,784,659,523,392,
440,523,659,784,880,784,659,523
];

let i=0;

bgmTimer=setInterval(()=>{
tone(notes[i],.22,.025,"sine");
tone(notes[i]/2,.18,.015,"triangle");
i++;
if(i>=notes.length)i=0;
},240);
}

function stopBGM(){
if(bgmTimer){
clearInterval(bgmTimer);
bgmTimer=null;
}
}

function toggleMute(){
muted=!muted;
document.getElementById("mute").textContent=muted?"🔇":"🔊";
if(muted) stopBGM();
else startBGM();
}

/* =======================
GAME
======================= */
function rand(){
return Math.floor(Math.random()*ITEMS.length);
}

function createGrid(){
grid=[];
for(let r=0;r<ROWS;r++){
grid[r]=[];
for(let c=0;c<COLS;c++){
grid[r][c]=rand();
}
}
}

function render(){
const g=document.getElementById("grid");
g.innerHTML="";

for(let r=0;r<ROWS;r++){
for(let c=0;c<COLS;c++){
const d=document.createElement("div");
d.className="cell";
d.textContent=ITEMS[grid[r][c]];
d.dataset.r=r;
d.dataset.c=c;
d.onclick=clickCell;
g.appendChild(d);
}
}
}

function clickCell(e){
const cell=e.currentTarget;
const r=+cell.dataset.r;
const c=+cell.dataset.c;

cell.classList.add("pop");

playClear();
spawnSpark(cell);

setTimeout(()=>{
grid[r][c]=rand();
render();
},260);
}

/* =======================
キラキラ演出
======================= */
function spawnSpark(cell){
const rect=cell.getBoundingClientRect();

for(let i=0;i<8;i++){
const s=document.createElement("div");
s.className="spark";
s.textContent=["✨","⭐","💫","🌟"][Math.floor(Math.random()*4)];

s.style.left=(rect.left+20+Math.random()*20)+"px";
s.style.top=(rect.top+15+Math.random()*20)+"px";

document.getElementById("particles").appendChild(s);

setTimeout(()=>s.remove(),800);
}
}

/* =======================
START
======================= */
function startGame(){
ctx().resume();
createGrid();
render();
startBGM();
}

startGame();
</script>
</body>
</html>
