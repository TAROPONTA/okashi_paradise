<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🍪 Cookie Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fdf4e7;--accent:#f4845f;--accent2:#6ec6a0;
  --text:#3d2b1f;--muted:#c4956a;
}
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow:auto;padding:12px 20px 20px;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(circle at 12% 18%,#fde8d8 0%,transparent 42%),
    radial-gradient(circle at 88% 78%,#dff5ea 0%,transparent 42%);
  z-index:0;pointer-events:none;
}

/* 言語ボタン */
#lang-switch{position:fixed;top:14px;left:14px;z-index:200;display:flex;gap:6px;}
.lang-btn{
  border:2px solid var(--accent);border-radius:10px;padding:4px 10px;
  font-family:'Fredoka One',cursive;font-size:.85rem;cursor:pointer;
  background:#fff8f0;color:var(--accent);transition:background .15s,color .15s;
}
.lang-btn.active{background:var(--accent);color:#fff;}

/* コンテナ */
.container{
  position:relative;z-index:1;width:max-content;
  margin:0 auto;display:flex;flex-direction:column;
  align-items:center;gap:10px;padding-bottom:16px;
}
h1{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--accent);text-shadow:3px 3px 0 #fde0d0;}
.wrap{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}

/* グリッド */
#grid-wrapper{display:flex;align-items:flex-start;flex-direction:column;}
#grid{
  display:grid;
  grid-template-columns:repeat(7,66px);
  grid-template-rows:repeat(8,66px);
  gap:6px;transform-origin:top left;
}
.cell{
  width:66px;height:66px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;cursor:pointer;user-select:none;
  background:rgba(255,255,255,0.55);
  border:1.5px solid rgba(210,160,100,0.22);
  box-shadow:0 2px 8px rgba(150,90,30,0.10), inset 0 1px 0 rgba(255,255,255,0.7);
  transition:transform .12s,box-shadow .12s;
  -webkit-tap-highlight-color:transparent;
}
.cell:hover{
  transform:scale(1.12) rotate(-3deg);
  box-shadow:0 6px 18px rgba(150,90,30,0.22), inset 0 1px 0 rgba(255,255,255,0.8);
  background:rgba(255,255,255,0.80);
}
.cell:active{transform:scale(.92)}
.cell-empty{width:66px;height:66px;visibility:hidden;pointer-events:none;}

/* グリッドエリアに薄いカード背景 */
#grid-wrapper{
  background:rgba(255,248,240,0.60);
  border-radius:18px;
  border:1.5px solid rgba(220,170,110,0.25);
  box-shadow:0 4px 24px rgba(180,110,50,0.10);
  padding:10px;
}
.cell.drop{animation:dropIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes dropIn{
  from{transform:translateY(-66px) scale(.7);opacity:0}
  to{transform:translateY(0) scale(1);opacity:1}
}

/* PCパネル */
.panel{width:150px;display:flex;flex-direction:column;gap:8px;}
.panel-mobile{display:none}
.label{font-size:.78rem;color:var(--muted);font-weight:800;letter-spacing:1px;text-transform:uppercase}
.value{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--accent);text-shadow:2px 2px 0 #fde0d0}
.timerbar{height:16px;border-radius:999px;background:rgba(180,120,60,.15);overflow:hidden}
#fill,#fill-m{height:100%;width:100%;background:linear-gradient(90deg,#f4845f,#e8bc5a);transition:.15s linear}
.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(180,120,60,.2),transparent)}

/* ボタン */
.btn{
  border:none;border-radius:14px;padding:12px;cursor:pointer;
  font-family:'Fredoka One',cursive;font-size:1rem;
  color:#fff;background:var(--accent);box-shadow:0 4px 0 #c95c3a;
  transition:transform .1s,box-shadow .1s;-webkit-tap-highlight-color:transparent;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 #c95c3a}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c95c3a}
.btn.green{background:var(--accent2);box-shadow:0 4px 0 #4a9f7a}
.btn.green:hover{box-shadow:0 6px 0 #4a9f7a}
.btn.green:active{box-shadow:0 2px 0 #4a9f7a}
.btn.x-btn{background:#000;box-shadow:0 4px 0 #333}
.btn.x-btn:hover{box-shadow:0 6px 0 #333}
.btn.x-btn:active{box-shadow:0 2px 0 #333}
#muteBtn,#muteBtn-m{font-size:1.3rem;padding:8px;opacity:1;transition:opacity .2s}
#muteBtn.muted,#muteBtn-m.muted{opacity:.5}

/* コンボ */
#combo{
  position:fixed;left:50%;top:44%;transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive;font-size:3.2rem;
  color:var(--accent);text-shadow:3px 3px 0 #fff,5px 5px 0 #fde0d0;
  opacity:0;pointer-events:none;z-index:50;
}

/* パーティクル */
#particles{position:fixed;inset:0;pointer-events:none;z-index:45;overflow:hidden}
.spark{position:absolute;font-size:1.6rem;animation:fly .85s ease-out forwards;pointer-events:none;}
@keyframes fly{
  0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}
  100%{opacity:0;transform:translateY(-90px) rotate(30deg) scale(.3)}
}

/* ゲームオーバー */
#gameover{
  position:fixed;inset:0;display:none;
  background:rgba(255,248,240,.95);backdrop-filter:blur(6px);
  z-index:60;justify-content:center;align-items:center;flex-direction:column;gap:14px;
}
#gameover.show{display:flex}
#gameover h2{font-family:'Fredoka One',cursive;font-size:3rem;color:var(--accent);text-shadow:3px 3px 0 #fde0d0}
#final{font-family:'Fredoka One',cursive;font-size:4.2rem;color:var(--text)}
.go-label{font-size:.8rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px}
#ranking{text-align:center;line-height:2;font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--muted);}
.go-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* ⑤ ピンチ点滅 (タイム残り10秒以下) */
@keyframes dangerPulse{
  0%,100%{color:var(--accent);}
  50%{color:#e02020;}
}
.danger{animation:dangerPulse .5s infinite;}

/* ② マイルストーン表示 */
#milestone-msg{
  position:fixed;left:50%;top:36%;
  transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive;font-size:2.6rem;
  color:#6ec6a0;
  text-shadow:3px 3px 0 #fff,5px 5px 0 #c8f0e0;
  opacity:0;pointer-events:none;z-index:51;
}

/* ① NEW RECORD */
#new-record{
  position:fixed;left:50%;top:30%;
  transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive;font-size:3rem;
  color:#e8bc5a;
  text-shadow:3px 3px 0 #fff,5px 5px 0 #fde8a0;
  opacity:0;pointer-events:none;z-index:52;
}

/* ④ 称号 */
#player-title{
  font-family:'Fredoka One',cursive;font-size:1.1rem;
  color:var(--muted);text-align:center;margin-top:-8px;
}
#go-title-badge{
  font-family:'Fredoka One',cursive;font-size:1.6rem;
  color:var(--accent);text-align:center;
  text-shadow:2px 2px 0 #fde0d0;
}

/* 紙吹雪 */
.confetti{
  position:fixed;pointer-events:none;z-index:55;
  width:10px;height:10px;border-radius:2px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}

/* スマホ */
@media(max-width:600px){
  body{padding:8px 4px 120px;}
  #lang-switch{top:8px;left:8px;}
  h1{font-size:1.6rem;margin-top:32px;}
  .panel{display:none}
  .panel-mobile{
    display:flex;flex-direction:column;gap:8px;
    width:100%;max-width:520px;padding:0 4px;
  }
  .mob-stats{display:flex;gap:8px;justify-content:space-between;align-items:flex-end;}
  .mob-stat{flex:1;text-align:center;}
  .mob-stat .label{font-size:.65rem;}
  .mob-stat .value{font-size:1.7rem;}
  .mob-timer{width:100%;}
  .mob-btns{display:flex;gap:8px;}
  .mob-btns .btn{flex:1;padding:10px 4px;font-size:.9rem;}
  #grid-wrapper{width:100%;display:flex;justify-content:center;}
  #grid{transform-origin:top center;}
  #donateBtn{
    right:auto!important;left:50%!important;
    transform:translateX(-50%)!important;
    bottom:10px!important;font-size:.8rem!important;padding:8px 14px!important;
  }
  #combo{font-size:2rem;}
}
</style>
</head>

<script>
/* ═══════════════════════════════════
   多言語
═══════════════════════════════════ */
const LANGS={
  ja:{

      [1000, '🍪👑 お菓子大王'],

      [2000, '🍪✨👑 お菓子の神様'],
    ],
    shareTitle:(s,t)=>`#クッキーパズル\nお菓子を${s}個食べたよ！${t}\nあなたは何個食べられるかな？\nhttps://taroponta.itch.io/cookie-puzzle`,
  },
  en:{
    title:'🍪 Cookie Puzzle',scoreLabel:'Cookies Eaten',highLabel:'High Score',timeLabel:'Time',
    start:'▶ Start',playing:'⏳ Playing',reset:'↺ Reset',
    goTitle:'🍪 Game Over!',goScore:'Your Score',goRetry:'Play Again 🍪',goShare:'𝕏 Share',
    rankSuffix:'',
    shareText:s=>`#CookiePuzzle\nI ate ${s} cookies! 🍪\nCan you beat my score?\nhttps://taroponta.itch.io/cookie-puzzle`,
    donate:'☕ Buy me a snack',
    newRecord:'🎉 NEW RECORD!',
    milestone:n=>`${n} Cookies! 🍪`,
    titles:[
      [0,    '🍪 Cookie Rookie'],
      [20,   '🧁 Sweet Lover'],
      [40,   '🍩 Donut Artisan'],
      [70,   '🍰 Cake Crafter'],
      [100,  '🍫 Chocolate Expert'],
      [140,  '🍬 Candy Master'],
      [180,  '✨ Sweets Virtuoso'],
      [230,  '🌟 Cookie Prodigy'],
      [280,  '💎 Junior Patissier'],
      [340,  '🏆 Master Patissier'],
      [400,  '👑 Confectionery Noble'],
      [470,  '🌈 Cookie Prince/Princess'],
      [550,  '🔥 Legendary Patissier'],
      [640,  '🎖️ Cookie Knight'],
      [740,  '🗡️ Sweets Champion'],
      [850,  '🧙 Cookie Sorcerer'],
      [970,  '🌙 Midnight Patissier'],
      [1000, '🍪👑 Cookie Monarch'],
      [1100, '⚡ Cookie Conqueror'],
      [1250, '🌌 Sweets Deity'],
      [1400, '🔮 Cookie Sage'],
      [1600, '💫 Ultimate Patissier'],
      [1800, '🌠 Cookie Legend'],
      [2000, '🍪✨👑 Cookie God'],
    ],
    shareTitle:(s,t)=>`#CookiePuzzle\nI ate ${s} cookies! ${t}\nCan you beat my score?\nhttps://taroponta.itch.io/cookie-puzzle`,
  }
};
let lang='ja';

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===(l==='ja'?'JP':'EN')));
  applyLang();
}
function applyLang(){
  const T=LANGS[lang];
  const ids={
    'txt-title':T.title,'txt-score-label':T.scoreLabel,'txt-high-label':T.highLabel,
    'txt-time-label':T.timeLabel,'txt-go-title':T.goTitle,'txt-go-score':T.goScore,
    'txt-go-retry':T.goRetry,'txt-go-share':T.goShare,
    'txt-score-label-m':T.scoreLabel,'txt-high-label-m':T.highLabel,'txt-time-label-m':T.timeLabel,
  };
  Object.entries(ids).forEach(([id,v])=>{ const e=document.getElementById(id); if(e) e.textContent=v; });
  document.getElementById('startBtn').textContent=running?T.playing:T.start;
  document.getElementById('resetBtn').textContent=T.reset;
  const sbm=document.getElementById('startBtn-m'); if(sbm) sbm.textContent=running?T.playing:T.start;
  const rbm=document.getElementById('resetBtn-m'); if(rbm) rbm.textContent=T.reset;
  const db=document.getElementById('donateBtn');   if(db)  db.textContent=T.donate;
  showRanking();
}

/* ═══════════════════════════════════
   定数 / 状態
═══════════════════════════════════ */
const ROWS=8,COLS=7,NEED=4;
const ITEMS=['🍪','🧁','🍩','🍰','🍫','🍬'];

let grid=[],score=0,timeLeft=60;
let running=false,busy=false,timer=null;
let muted=false;

const el    = id=>document.getElementById(id);
const rand  = ()=>Math.floor(Math.random()*ITEMS.length);
const sleep = ms=>new Promise(r=>setTimeout(r,ms));

/* ═══════════════════════════════════
   効果音 (sfxCtx)
═══════════════════════════════════ */
let sfxCtx=null;
function getSfx(){
  if(!sfxCtx||sfxCtx.state==='closed')
    sfxCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(sfxCtx.state==='suspended') sfxCtx.resume();
  return sfxCtx;
}
function tone(freq,dur,vol,type,delay,dest){
  if(muted) return;
  const c=getSfx(); if(!dest) dest=c.destination;
  const o=c.createOscillator(),g=c.createGain();
  const t=c.currentTime+(delay||0);
  o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol||0.06,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.12));
  o.connect(g);g.connect(dest);o.start(t);o.stop(t+(dur||0.12));
}
function playClear(n){
  if(muted) return;
  const c=getSfx();
  const mg=c.createGain();mg.gain.value=0.36;mg.connect(c.destination);
  const base=560+(n||0)*80;
  [1,1.26,1.5,2].forEach((r,i)=>{
    tone(base*r,0.14,0.5,'sine',i*0.055,mg);
    tone(base*r*2,0.09,0.18,'triangle',i*0.055+0.02,mg);
  });
  tone(base*2.5,0.3,0.2,'sine',0.23,mg);
}
function playCombo(n){
  if(muted) return;
  const c=getSfx();
  const mg=c.createGain();mg.gain.value=0.33;mg.connect(c.destination);
  const sc=[523,659,784,1047,1319];
  const top=Math.min(n,sc.length-1);
  for(let i=0;i<=top;i++){
    tone(sc[i],0.18,0.5,'sine',i*0.07,mg);
    tone(sc[i]*1.5,0.1,0.2,'triangle',i*0.07+0.01,mg);
  }
}
function playOver(){
  if(muted) return;
  [440,392,349,294,261].forEach((f,i)=>tone(f,0.28,0.06,'sine',i*0.12));
}

/* ═══════════════════════════════════
   BGM — "look-ahead scheduler" 方式
   Web Audio APIのcurrentTimeを基準に
   常に少し先をスケジュールし続けることで
   途切れ・重複のない安定ループを実現する
═══════════════════════════════════ */
let bgmAC   = null;   /* BGM専用AudioContext          */
let bgmTick = null;   /* scheduler用setInterval       */
let bgmNext = 0;      /* 次にスケジュールする絶対時刻  */
let bgmActiveBPM = 0; /* 現在再生中のBPM              */

/* スコア段階に対応したBPM */
function bgmBPM(){
  if(score>=300) return 220;
  if(score>=200) return 196;
  if(score>=100) return 172;
  return 148;
}

/* ノートを1個スケジュール */
function schedNote(ac,dest,type,freq,startT,durT,vol){
  try{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,startT);
    g.gain.exponentialRampToValueAtTime(0.0001,startT+durT);
    o.connect(g);g.connect(dest);
    o.start(startT);o.stop(startT+durT);
  }catch(e){}
}

/* 1ループ分をスケジュール。startT=開始絶対時刻, beat=1拍の秒数 */
function schedLoop(ac,startT,beat){
  const gMel=ac.createGain(); gMel.gain.value=0.10; gMel.connect(ac.destination);
  const gCnt=ac.createGain(); gCnt.gain.value=0.05; gCnt.connect(ac.destination);
  const gBas=ac.createGain(); gBas.gain.value=0.09; gBas.connect(ac.destination);
  const gHat=ac.createGain(); gHat.gain.value=0.032;gHat.connect(ac.destination);
  const gKik=ac.createGain(); gKik.gain.value=0.11; gKik.connect(ac.destination);

  /* メロディ (音程Hz, 拍数) */
  const mel=[
    [784,.5],[880,.5],[1047,1],[880,.5],[784,.5],
    [659,1],[784,1],[659,.5],[523,.5],
    [523,.5],[659,.5],[784,1],[880,.5],[1047,.5],
    [880,1],[784,1],[659,2],
  ];
  /* カウンターメロディ (5度上) */
  const cnt=mel.map(([f,d])=>[f*1.498,d]);
  /* ベース */
  const bass=[
    [196,.5],[196,.5],[196,1],[220,.5],[196,.5],
    [165,1],[196,1],[165,.5],[131,.5],
    [131,.5],[165,.5],[196,1],[220,.5],[261,.5],
    [220,1],[196,1],[165,2],
  ];

  /* メロディ・カウンター・ベースをスケジュール */
  [[mel,gMel,'sine'],[cnt,gCnt,'triangle'],[bass,gBas,'triangle']].forEach(([notes,dest,type])=>{
    let t=startT;
    notes.forEach(([f,d])=>{
      const dur=d*beat*0.78;
      schedNote(ac,dest,type,f,t,dur,0.55);
      t+=d*beat;
    });
  });

  /* ドラム (8分音符ステップ) */
  const totalBeats=mel.reduce((s,[,d])=>s+d,0);
  const steps=totalBeats*2;
  for(let i=0;i<steps;i++){
    const t=startT+i*beat*0.5;
    /* ハイハット */
    schedNote(ac,gHat,'sawtooth',9000+Math.random()*4000,t,0.016,i%2===0?0.42:0.16);
    /* キック (1・3拍目) */
    if(i%4===0){
      schedNote(ac,gKik,'sine',80,t,0.18,0.85);
      schedNote(ac,gKik,'sine',55,t+0.01,0.20,0.55);
    }
    /* スネア (2・4拍目) */
    if(i%4===2){
      schedNote(ac,gHat,'sawtooth',220+Math.random()*80,t,0.08,0.30);
    }
  }

  /* このループの長さ(秒)を返す */
  return totalBeats*beat;
}

/* BGMスケジューラーの心臓部
   50msごとに呼ばれ、現在時刻から0.3秒先までをスケジュール済みにする */
const SCHED_AHEAD = 0.3; /* 先読み秒数 */
const SCHED_TICK  = 50;  /* チェック間隔ms */

function bgmScheduler(){
  if(!bgmAC||bgmAC.state==='closed') return;
  const beat=60/bgmActiveBPM;
  while(bgmNext < bgmAC.currentTime + SCHED_AHEAD){
    const loopDur=schedLoop(bgmAC,bgmNext,beat);
    bgmNext+=loopDur;
  }
}

function startBGM(){
  stopBGM();
  if(muted) return;
  bgmActiveBPM=bgmBPM();
  bgmAC=new(window.AudioContext||window.webkitAudioContext)();
  bgmNext=bgmAC.currentTime+0.05;
  bgmScheduler(); /* 即座に最初の分をスケジュール */
  bgmTick=setInterval(bgmScheduler,SCHED_TICK);
}

function stopBGM(){
  if(bgmTick){clearInterval(bgmTick);bgmTick=null;}
  if(bgmAC){try{bgmAC.close();}catch(e){}bgmAC=null;}
  bgmActiveBPM=0;
}

/* スコアが閾値を超えてBPMが変わったら即切り替え */
function checkBPM(){
  if(running&&!muted&&bgmBPM()!==bgmActiveBPM) startBGM();
}

function toggleMute(){
  muted=!muted;
  ['muteBtn','muteBtn-m'].forEach(id=>{
    const b=el(id);if(!b)return;
    b.textContent=muted?'🔇':'🔊';
    b.classList.toggle('muted',muted);
  });
  if(muted){stopBGM();}else if(running){startBGM();}
}

function makeCookieEl(type){
  const wrap = document.createElement('div');
  wrap.style.cssText='width:56px;height:56px;display:flex;align-items:center;justify-content:center;';
  wrap.innerHTML = COOKIE_SVG[type];
  const svg = wrap.querySelector('svg');
  if(svg){ svg.style.width='54px'; svg.style.height='54px'; }
  return wrap;
}
/* ═══════════════════════════════════
   グリッド
═══════════════════════════════════ */
function createGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++)grid[r][c]=rand();}
}

function render(dropSet){
  const g=el('grid');g.innerHTML='';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const val=grid[r][c];
      const d=document.createElement('div');
      if(val===-1){
        d.className='cell-empty';
      }else{
        d.className='cell';
        if(dropSet&&dropSet.has(r+','+c))d.classList.add('drop');
        d.appendChild(makeCookieEl(val));
        d.onclick=clickCell;
        d.dataset.r=r;d.dataset.c=c;
      }
      g.appendChild(d);
    }
  }
}

function findMatch(){
  const seen=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  const set=new Set();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]===-1||seen[r][c])continue;
      const type=grid[r][c],stack=[[r,c]],group=[];
      seen[r][c]=true;
      while(stack.length){
        const[y,x]=stack.pop();group.push([y,x]);
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dy,dx])=>{
          const ny=y+dy,nx=x+dx;
          if(ny>=0&&nx>=0&&ny<ROWS&&nx<COLS&&!seen[ny][nx]&&grid[ny][nx]===type){
            seen[ny][nx]=true;stack.push([ny,nx]);
          }
        });
      }
      if(group.length>=NEED)group.forEach(([y,x])=>set.add(y+','+x));
    }
  }
  return set;
}

function gravity(){
  const drop=new Set();
  for(let c=0;c<COLS;c++){
    let w=ROWS-1;
    for(let r=ROWS-1;r>=0;r--){
      if(grid[r][c]!==-1){grid[w][c]=grid[r][c];if(w!==r)drop.add(w+','+c);w--;}
    }
    for(let r=w;r>=0;r--){grid[r][c]=rand();drop.add(r+','+c);}
  }
  return drop;
}

function getCellEl(r,c){
  return el('grid').querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

/* ═══════════════════════════════════
   タイム回復係数（連鎖数に応じて増加・全体的に控えめに）
   chain=1: ×0.3  chain=2: ×0.5  chain=3: ×0.8
   chain=4: ×1.2  chain≥5: ×1.8
═══════════════════════════════════ */
/* タイム回復係数 (前回と難しすぎ版の中間)
   chain=1: ×0.45  chain=2: ×0.8  chain=3: ×1.3
   chain=4: ×2.0   chain≥5: ×3.0
*/
function timeBonus(hitSize,chainN){
  const mul=[0,0.45,0.8,1.3,2.0,3.0];
  return hitSize*mul[Math.min(chainN,mul.length-1)];
}

/* ═══════════════════════════════════
   クリック: 1個消去 → 落下 → 連鎖
═══════════════════════════════════ */
async function clickCell(e){
  if(!running||busy)return;
  busy=true;
  const r=+e.currentTarget.dataset.r,c=+e.currentTarget.dataset.c;
  const cellEl=getCellEl(r,c);
  if(cellEl){
    const rect=cellEl.getBoundingClientRect();
    spawnSparks(rect.left+rect.width/2,rect.top+rect.height/2,4);
  }
  playClear(0);
  grid[r][c]=-1;
  timeLeft=Math.max(0,timeLeft-1);
  render(null);
  await sleep(160);
  const drop=gravity();render(drop);
  await sleep(300);
  await chain(1);
  busy=false;
}

/* ═══════════════════════════════════
   連鎖処理
═══════════════════════════════════ */
async function chain(n){
  const hit=findMatch();
  if(hit.size===0)return;

  showCombo(n);
  if(n>1)playCombo(n);

  hit.forEach(k=>{
    const[r,c]=k.split(',').map(Number);
    const cellEl=getCellEl(r,c);
    if(!cellEl)return;
    const rect=cellEl.getBoundingClientRect();
    spawnSparks(rect.left+rect.width/2,rect.top+rect.height/2,5);
    grid[r][c]=-1;
  });

  playClear(n-1);
  render(null);

  score+=hit.size;
  timeLeft=Math.min(60,timeLeft+timeBonus(hit.size,n));
  updateUI();
  checkBPM();
  checkMilestone();

  await sleep(480);
  const drop=gravity();render(drop);
  await sleep(300);
  await chain(n+1);
}

═══════════════════════════════════ */
function updateUI(){
  const t=Math.ceil(timeLeft);
  const pct=timeLeft/60*100;
  const bg=pct>40?'linear-gradient(90deg,#f4845f,#e8bc5a)':
           pct>20?'linear-gradient(90deg,#e87040,#e05a2a)':
                  'linear-gradient(90deg,#e02020,#c01010)';
  el('score').textContent=score;el('time').textContent=t;
  el('fill').style.width=pct+'%';el('fill').style.background=bg;
  const sm=el('score-m'),tm=el('time-m'),fm=el('fill-m');
  if(sm)sm.textContent=score;if(tm)tm.textContent=t;
  if(fm){fm.style.width=pct+'%';fm.style.background=bg;}
  updateTitle();
  updateDanger();
}

/* タイム減少係数 (スコアで加速) */
function decayRate(){
  if(score>=300)return 1.90;
  if(score>=200)return 1.55;
  if(score>=100)return 1.25;
  return 1.0;
}

function startGame(){
  if(running)return;
  getSfx().resume();
  running=true;
  const T=LANGS[lang];
  el('startBtn').disabled=true;el('startBtn').textContent=T.playing;
  const sbm=el('startBtn-m');if(sbm){sbm.disabled=true;sbm.textContent=T.playing;}
  startBGM();
  timer=setInterval(()=>{
    timeLeft-=0.1*decayRate();
    if(timeLeft<=0){timeLeft=0;updateUI();endGame();return;}
    updateUI();
  },100);
}

function endGame(){
  running=false;clearInterval(timer);
  stopBGM();playOver();
  /* ピンチ演出リセット */
  document.body.style.background='';
  ['time','time-m'].forEach(id=>{const e=el(id);if(e)e.classList.remove('danger');});
  const prevHigh=+localStorage.getItem('cookieHigh')||0;
  const isNewRecord=score>prevHigh;
  saveScore();
  el('final').textContent=score;
  /* 称号 */
  const titleBadge=el('go-title-badge');
  if(titleBadge)titleBadge.textContent=getTitle(score);
  showRanking();
  el('gameover').classList.add('show');
  /* NEW RECORD演出 */
  if(isNewRecord&&score>0) setTimeout(showNewRecord,400);
}

  if(timeLeft<=10&&running){
    if(te)te.classList.add('danger');
    if(tme)tme.classList.add('danger');
    body.style.transition='background .3s';
    body.style.background='linear-gradient(135deg,#fdf4e7 60%,#ffe0e0 100%)';
  }else{
    if(te)te.classList.remove('danger');
    if(tme)tme.classList.remove('danger');
    body.style.background='';
  }
}

/* ═══════════════════════════════════
   初期化
═══════════════════════════════════ */
resetGame();
applyLang();

/* PC・スマホ両対応: グリッドをvp幅・高さに合わせてscale */
const GRID_COLS=7, GRID_ROWS=8, CELL=66, GAP=6;
const GRID_W = CELL*GRID_COLS + GAP*(GRID_COLS-1); /* 498px */
const GRID_H = CELL*GRID_ROWS + GAP*(GRID_ROWS-1); /* 576px */

function scaleGrid(){
  const g  = document.getElementById('grid');
  const w  = document.getElementById('grid-wrapper');
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const isMobile = vw <= 600;

  /* 利用可能な幅・高さを推定
     PC  : タイトル(~60px)+gap(18px)+padding(40px) = ~118px をvhから引く
     Mobile: タイトル(~48px)+gap(18px)+panel下部(~130px)+padding(16px) = ~212px */
  const reservedH = isMobile ? 212 : 118;
  const reservedW = isMobile ? 8   : 24+164+24+40; /* grid側の余白 */

  const availW = vw - reservedW;
  const availH = vh - reservedH;

  const sW = availW / GRID_W;
  const sH = availH / GRID_H;
  const s  = Math.min(sW, sH, 1); /* 1より大きくはしない */

  g.style.transform       = 'scale('+s+')';
  g.style.transformOrigin = isMobile ? 'top center' : 'top left';
  w.style.width    = Math.round(GRID_W*s)+'px';
  w.style.height   = Math.round(GRID_H*s)+'px';
  w.style.overflow = 'hidden';
}

scaleGrid();
window.addEventListener('resize', scaleGrid);
</script>
